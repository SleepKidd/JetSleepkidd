<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CUBES SLEEPKIDD</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <!-- ПОДКЛЮЧАЕМ THREE.JS -->
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --primary: #bc13fe; --bg: #000; --win: #00ff88; --lose: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        .logo-box { margin: 30px 0 10px; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-15deg); text-align: center; line-height: 1; }
        .logo-box .top { font-size: 26px; color: var(--primary); display: block; text-shadow: 0 0 20px var(--primary); animation: hyperGlitch 2s infinite; }
        .logo-box .bot { font-size: 42px; color: #fff; letter-spacing: -2px; }
        @keyframes hyperGlitch { 0%, 90% { transform: translate(0); } 92% { transform: translate(-3px, 1px); } 94% { transform: translate(3px, -1px); } }

        .container { width: 94%; max-width: 420px; background: rgba(10, 10, 10, 0.95); border: 2px solid var(--primary); border-radius: 45px; padding: 20px; text-align: center; box-shadow: 0 0 50px rgba(188, 19, 254, 0.4); backdrop-filter: blur(20px); z-index: 10; }
        
        .nav-bar { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 10px; }
        .back-nav { text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 900; padding: 8px 18px; border-radius: 12px; background: #111; border: 1.5px solid var(--primary); text-transform: uppercase; }

        .history-line { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; height: 45px; }
        .hist-item { background: #000; border: 2px solid var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; }
        .bal-val { color: var(--win); font-weight: 900; font-size: 2.2rem; margin-bottom: 10px; }

        /* КОНТЕЙНЕР ДЛЯ THREE.JS */
        #dice-container { width: 100%; height: 200px; margin: 10px 0; cursor: grab; position: relative; }
        
        .bet-input { width: 100%; background: #111; border: 2px solid #333; color: #fff; padding: 16px; border-radius: 20px; font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 15px; font-family: 'Orbitron'; }
        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .choice-btn { background: #000; border: 2px solid #222; color: #fff; padding: 15px; border-radius: 18px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; }
        .choice-btn.active { border-color: var(--primary); background: rgba(188, 19, 254, 0.1); }
        .main-btn { width: 100%; height: 80px; background: linear-gradient(180deg, var(--primary), #8a0db8); color: #fff; border: none; border-radius: 22px; font-weight: 900; font-size: 1.8rem; text-transform: uppercase; cursor: pointer; }
        .main-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

    <div class="logo-box"><span class="top">CUBES</span><span class="bot">SLEEPKIDD</span></div>

    <div class="container">
        <div class="nav-bar"><a href="index.html" class="back-nav">МЕНЮ</a></div>
        <div id="history" class="history-line"></div>
        <div class="bal-val"><span id="u-bal">0</span> ₽</div>

        <!-- СЮДА РЕНДЕРИТСЯ КУБИК -->
        <div id="dice-container"></div>

        <input type="number" id="bet" class="bet-input" value="50">
        <div class="choice-grid">
            <button class="choice-btn active" id="btn-even" onclick="setChoice('even')">ЧЕТНОЕ</button>
            <button class="choice-btn" id="btn-odd" onclick="setChoice('odd')">НЕЧЕТНОЕ</button>
        </div>
        <button class="main-btn" id="roll-btn" onclick="roll()">КРУТИТЬ</button>
    </div>

    <script>
        let balance, user, users, currentChoice = 'even';
        let scene, camera, renderer, cube;

        // 1. ИНИЦИАЛИЗАЦИЯ THREE.JS
        function init3D() {
            const container = document.getElementById('dice-container');
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, container.offsetWidth / container.offsetHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.offsetWidth, container.offsetHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Свет
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffffff, 1.5);
            pointLight.position.set(5, 5, 5);
            scene.add(pointLight);

            // Создание кубика (Box + скругление имитируем через текстуру/материал)
            const geometry = new THREE.BoxGeometry(2, 2, 2);
            
            // Загрузка текстур точек (генерация Canvas текстуры для 8K четкости)
            const materials = [];
            for (let i = 1; i <= 6; i++) {
                materials.push(new THREE.MeshStandardMaterial({ 
                    map: createDiceTexture(i),
                    roughness: 0.3,
                    metalness: 0.1,
                    color: 0xffffff 
                }));
            }
            
            cube = new THREE.Mesh(geometry, materials);
            scene.add(cube);
            camera.position.z = 6;
            animate();
        }

        function createDiceTexture(number) {
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, 512, 512);
            
            ctx.fillStyle = number === 1 ? '#ff3b30' : '#111';
            const dots = {
                1: [[256, 256]],
                2: [[128, 128], [384, 384]],
                3: [[128, 128], [256, 256], [384, 384]],
                4: [[128, 128], [128, 384], [384, 128], [384, 384]],
                5: [[128, 128], [128, 384], [256, 256], [384, 128], [384, 384]],
                6: [[128, 128], [128, 256], [128, 384], [384, 128], [384, 256], [384, 384]]
            };
            dots[number].forEach(d => {
                ctx.beginPath();
                ctx.arc(d[0], d[1], 45, 0, Math.PI * 2);
                ctx.fill();
            });
            return new THREE.CanvasTexture(canvas);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (cube) {
                cube.rotation.x += 0.005;
                cube.rotation.y += 0.005;
            }
            renderer.render(scene, camera);
        }

        // 2. ЛОГИКА ИГРЫ
        window.onload = () => {
            user = localStorage.getItem('current_user') || 'GUEST';
            users = JSON.parse(localStorage.getItem('users_jet')) || {'GUEST': {bal: 1000}};
            balance = users[user].bal;
            document.getElementById('u-bal').innerText = Math.floor(balance).toLocaleString();
            init3D();
        };

        const finalRots = {
            1: { x: 0, y: 0 },
            2: { x: 0, y: Math.PI / 2 },
            3: { x: -Math.PI / 2, y: 0 },
            4: { x: Math.PI / 2, y: 0 },
            5: { x: 0, y: -Math.PI / 2 },
            6: { x: 0, y: Math.PI }
        };

        function roll() {
            let bet = parseInt(document.getElementById('bet').value);
            if(bet > balance || bet <= 0) return alert("Мало денег!");
            
            balance -= bet; 
            document.getElementById('u-bal').innerText = Math.floor(balance).toLocaleString();
            
            const btn = document.getElementById('roll-btn');
            btn.disabled = true;

            const res = Math.floor(Math.random() * 6) + 1;
            
            // Анимация броска
            const startTime = performance.now();
            const duration = 2000;
            const startRotX = cube.rotation.x;
            const startRotY = cube.rotation.y;
            const targetRot = finalRots[res];
            const extraSpins = Math.PI * 8;

            function updateRoll(time) {
                const elapsed = time - startTime;
                const t = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - t, 3); // OutCubic

                cube.rotation.x = startRotX + (targetRot.x + extraSpins - startRotX) * ease;
                cube.rotation.y = startRotY + (targetRot.y + extraSpins - startRotY) * ease;

                if (t < 1) {
                    requestAnimationFrame(updateRoll);
                } else {
                    finishRoll(res, bet);
                }
            }
            requestAnimationFrame(updateRoll);
        }

        function finishRoll(res, bet) {
            const won = (currentChoice === 'even' && res % 2 === 0) || (currentChoice === 'odd' && res % 2 !== 0);
            if(won) {
                balance += bet * 1.95;
                addHistory(res, '#00ff88');
            } else {
                addHistory(res, '#ff4d4d');
            }
            document.getElementById('u-bal').innerText = Math.floor(balance).toLocaleString();
            saveDB();
            document.getElementById('roll-btn').disabled = false;
        }

        function setChoice(t) {
            currentChoice = t;
            document.getElementById('btn-even').classList.toggle('active', t === 'even');
            document.getElementById('btn-odd').classList.toggle('active', t === 'odd');
        }

        function addHistory(n, c) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.style.cssText = `background:#000; border:2px solid ${c}; color:${c}; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; font-weight:900;`;
            div.innerText = n; h.prepend(div);
            if(h.children.length > 4) h.lastChild.remove();
        }

        function saveDB() { if(users[user]) { users[user].bal = balance; localStorage.setItem('users_jet', JSON.stringify(users)); } }
    </script>
</body>
</html>
