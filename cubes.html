<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CUBES ELITE — NUCLEAR EDITION</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --bg: #000; --win: #00ff88; --lose: #ff4d4d; --neon: 0 0 30px rgba(188, 19, 254, 0.6); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }

        #fx-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }

        /* ГЛИТЧ ЛОГО */
        .logo-box { margin: 25px 0 10px; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-12deg); text-align: center; position: relative; z-index: 10; }
        .logo-box .top { font-size: 24px; color: var(--primary); display: block; text-shadow: var(--neon); animation: hyperGlitch 1.5s infinite; }
        .logo-box .top::before, .logo-box .top::after { content: 'CUBES'; position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; }
        .logo-box .top::before { color: #00f6ff; z-index: -1; animation: rgbSplit 1.5s infinite; }
        .logo-box .top::after { color: #ff00de; z-index: -2; animation: rgbSplit 1.5s infinite reverse; }

        @keyframes hyperGlitch { 0%, 100% { transform: translate(0); } 16% { transform: translate(-4px, 2px); } 81% { transform: translate(2px, 2px); } }
        @keyframes rgbSplit { 0%, 15%, 19%, 80%, 84%, 100% { opacity: 0; transform: translate(0); } 16%, 18% { opacity: 1; transform: translate(-8px, 0); } }
        .logo-box .bot { font-size: 38px; color: #fff; letter-spacing: -2px; line-height: 0.8; }

        .player-bar { 
            width: 95%; max-width: 400px; background: rgba(188, 19, 254, 0.1); 
            border: 1px solid var(--primary); border-radius: 100px; 
            padding: 8px 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; box-shadow: var(--neon);
        }

        .container { 
            width: 92%; max-width: 420px; background: rgba(5, 5, 5, 0.95); 
            border: 2px solid var(--primary); border-radius: 50px; padding: 25px; 
            text-align: center; box-shadow: 0 0 80px rgba(188, 19, 254, 0.4); 
            position: relative; z-index: 10; backdrop-filter: blur(15px);
        }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-menu {
            text-decoration: none; color: #fff; background: rgba(188, 19, 254, 0.15);
            border: 1px solid var(--primary); padding: 8px 18px; border-radius: 12px;
            font-size: 11px; font-weight: 900; text-transform: uppercase;
        }

        .bal-val { color: var(--win); font-weight: 900; font-size: 2.2rem; margin-bottom: 15px; text-shadow: 0 0 20px var(--win); }

        /* 3D КУБИК */
        .scene { width: 100px; height: 100px; perspective: 1000px; margin: 40px auto 60px; }
        .cube { 
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d; 
            transition: transform 1.5s cubic-bezier(0.17, 0.67, 0.1, 1);
            transform: rotateX(45deg) rotateY(45deg);
        }
        .face { 
            position: absolute; width: 100px; height: 100px; 
            background: #fff; border-radius: 18px; 
            display: grid; grid-template: repeat(3, 1fr) / repeat(3, 1fr); 
            padding: 12px; box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
            border: 2px solid #ddd;
        }
        .dot { background: #111; border-radius: 50%; width: 16px; height: 16px; align-self: center; justify-self: center; }
        .f-1 .dot { background: var(--lose); width: 24px; height: 24px; }

        .f-1 { transform: rotateY(0deg) translateZ(50px); }
        .f-6 { transform: rotateY(180deg) translateZ(50px); }
        .f-3 { transform: rotateY(90deg) translateZ(50px); }
        .f-4 { transform: rotateY(-90deg) translateZ(50px); }
        .f-2 { transform: rotateX(90deg) translateZ(50px); }
        .f-5 { transform: rotateX(-90deg) translateZ(50px); }

        /* ИСТОРИЯ С ПОДСВЕТКОЙ */
        .h-line { display: flex; gap: 8px; justify-content: center; }
        .h-dot { width: 32px; height: 32px; background: #000; border: 1.5px solid #222; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .h-dot.win { color: var(--win); border-color: var(--win); box-shadow: 0 0 10px var(--win); }
        .h-dot.lose { color: var(--lose); border-color: var(--lose); box-shadow: 0 0 10px var(--lose); }

        input { width: 100%; background: #000; border: 2px solid #222; color: #fff; padding: 15px; border-radius: 20px; font-size: 1.8rem; font-weight: 900; text-align: center; margin-bottom: 15px; }
        .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .choice-btn { background: #000; border: 2px solid #222; color: #fff; padding: 16px; border-radius: 20px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .choice-btn.active { border-color: var(--primary); background: rgba(188, 19, 254, 0.2); box-shadow: var(--neon); }
        
        .main-btn { 
            width: 100%; height: 80px; 
            background: linear-gradient(180deg, var(--primary), #8a0db8); 
            color: #fff; border: none; border-radius: 25px; 
            font-weight: 900; font-size: 2rem; text-transform: uppercase; 
            cursor: pointer; box-shadow: 0 0 40px rgba(188, 19, 254, 0.6);
        }
    </style>
</head>
<body>

    <canvas id="fx-canvas"></canvas>
    <audio id="track" loop><source src="6utra.mp3" type="audio/mpeg"></audio>

    <div class="logo-box">
        <span class="top">CUBES</span>
        <span class="bot">SLEEPKIDD</span>
    </div>

    <div class="player-bar">
        <div style="width:12px; height:12px; background:var(--primary); border-radius:50%; animation: pulse 1s infinite;"></div>
        <marquee style="font-size: 10px; color: var(--primary); font-weight: 900; flex: 1;">QUANTUM_LINK_ACTIVE: 6 УТРА — В КАБИНЕ ФОТОГРАФИЯ ТВОЯ...</marquee>
    </div>

    <div class="container">
        <div class="top-nav">
            <a href="index.html" class="btn-menu">МЕНЮ</a>
            <div class="h-line" id="history"></div>
        </div>
        
        <div class="bal-val" id="u-bal">5 000 ₽</div>

        <div class="scene">
            <div class="cube" id="cube">
                <div class="face f-1"><div class="dot" style="grid-area: 2/2"></div></div>
                <div class="face f-6">
                    <div class="dot" style="grid-area: 1/1"></div><div class="dot" style="grid-area: 1/3"></div>
                    <div class="dot" style="grid-area: 2/1"></div><div class="dot" style="grid-area: 2/3"></div>
                    <div class="dot" style="grid-area: 3/1"></div><div class="dot" style="grid-area: 3/3"></div>
                </div>
                <div class="face f-3"><div class="dot" style="grid-area: 1/1"></div><div class="dot" style="grid-area: 2/2"></div><div class="dot" style="grid-area: 3/3"></div></div>
                <div class="face f-4"><div class="dot" style="grid-area: 1/1"></div><div class="dot" style="grid-area: 1/3"></div><div class="dot" style="grid-area: 3/1"></div><div class="dot" style="grid-area: 3/3"></div></div>
                <div class="face f-2"><div class="dot" style="grid-area: 1/3"></div><div class="dot" style="grid-area: 3/1"></div></div>
                <div class="face f-5"><div class="dot" style="grid-area: 1/1"></div><div class="dot" style="grid-area: 1/3"></div><div class="dot" style="grid-area: 2/2"></div><div class="dot" style="grid-area: 3/1"></div><div class="dot" style="grid-area: 3/3"></div></div>
            </div>
        </div>

        <input type="number" id="bet" value="100">
        <div class="choice-grid">
            <button class="choice-btn active" id="btn-even" onclick="setChoice('even')">ЧЕТНОЕ</button>
            <button class="choice-btn" id="btn-odd" onclick="setChoice('odd')">НЕЧЕТНОЕ</button>
        </div>
        <button class="main-btn" id="roll-btn" onclick="roll()">КРУТИТЬ</button>
    </div>

    <script>
        let balance, currentChoice = 'even';
        let rollCount = 0;
        const cube = document.getElementById('cube');
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');
        const rots = { 1: {x:0, y:0}, 6: {x:0, y:180}, 3: {x:0, y:-90}, 4: {x:0, y:90}, 2: {x:-90, y:0}, 5: {x:90, y:0} };
        let particles = [];

        window.onload = () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            balance = parseInt(localStorage.getItem('bal')?.replace(/\s/g, '') || 5000);
            updateUI(); loadHistory(); renderFX();
        };

        function setChoice(t) {
            currentChoice = t;
            document.getElementById('btn-even').classList.toggle('active', t === 'even');
            document.getElementById('btn-odd').classList.toggle('active', t === 'odd');
        }

        function roll() {
            document.getElementById('track').play().catch(() => {});
            let bet = parseInt(document.getElementById('bet').value);
            if(bet > balance || bet <= 0) return;

            balance -= bet; updateUI();
            rollCount++;
            
            const result = Math.floor(Math.random() * 6) + 1;
            
            // КРУТИТСЯ ЧЁТКО: добавляем обороты
            const xRot = rots[result].x + (1440 * rollCount);
            const yRot = rots[result].y + (1440 * rollCount);
            cube.style.transform = `rotateX(${xRot}deg) rotateY(${yRot}deg)`;

            for(let i=0; i<30; i++) spawnParticle();

            setTimeout(() => {
                const isEven = result % 2 === 0;
                const win = (currentChoice === 'even' && isEven) || (currentChoice === 'odd' && !isEven);
                
                if(win) { 
                    balance += bet * 2; 
                    for(let i=0; i<60; i++) spawnParticle(true);
                }
                updateUI();
                addHistory(result, win);
            }, 1500);
        }

        function spawnParticle(isWin = false) {
            particles.push({
                x: window.innerWidth / 2, y: window.innerHeight / 2,
                vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20,
                life: 1, color: isWin ? '#00ff88' : '#bc13fe'
            });
        }

        function renderFX() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                ctx.fillStyle = p.color; ctx.globalAlpha = p.life;
                ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
                if(p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(renderFX);
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = balance.toLocaleString() + " ₽";
            localStorage.setItem('bal', balance.toLocaleString());
        }

        function addHistory(res, win) {
            let h = JSON.parse(localStorage.getItem('cubes_h') || '[]');
            h.unshift({ val: res, win: win });
            if(h.length > 4) h.pop();
            localStorage.setItem('cubes_h', JSON.stringify(h));
            loadHistory();
        }

        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('cubes_h') || '[]');
            document.getElementById('history').innerHTML = h.map(x => 
                `<div class="h-dot ${x.win ? 'win' : 'lose'}">${x.val}</div>`
            ).join('');
        }
    </script>
</body>
</html>
