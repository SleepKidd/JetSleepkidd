<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLOCK BLAST — ELITE EDITION</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --bg: #000; --win: #00ff88; --lose: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; overflow: hidden; position: relative;
        }

        /* ГИПЕР-ГЛИТЧ ЛОГОТИП */
        .logo-box { margin: 25px 0 15px; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-12deg); text-align: center; position: relative; }
        .logo-box .top { 
            font-size: 26px; color: var(--primary); display: block; 
            text-shadow: 0 0 15px var(--primary); position: relative;
            animation: hyperGlitch 1.5s infinite;
        }
        .logo-box .top::before, .logo-box .top::after {
            content: 'BLOCK'; position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0;
        }
        .logo-box .top::before { color: #00f6ff; z-index: -1; animation: rgbSplit 1.5s infinite; }
        .logo-box .top::after { color: #ff00de; z-index: -2; animation: rgbSplit 1.5s infinite reverse; }

        @keyframes hyperGlitch { 0%, 100% { transform: translate(0); } 16% { transform: translate(-4px, 2px); } 81% { transform: translate(2px, 2px); } }
        @keyframes rgbSplit { 0%, 15%, 19%, 80%, 84%, 100% { opacity: 0; transform: translate(0); } 16%, 18% { opacity: 1; transform: translate(-8px, 0); } }
        .logo-box .bot { font-size: 40px; color: #fff; letter-spacing: -2px; line-height: 0.8; }

        /* ПЛЕЕР С КНОПКАМИ */
        .player-bar {
            width: 95%; max-width: 400px; background: rgba(188, 19, 254, 0.1); 
            border: 1px solid var(--primary); border-radius: 100px; 
            padding: 8px 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
        }
        .p-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-size: 16px; font-weight: 900; }
        .disk { width: 22px; height: 22px; background: var(--primary); border-radius: 50%; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .container { 
            width: 95%; max-width: 420px; background: #0a0a0a; 
            border: 2px solid var(--primary); border-radius: 40px; 
            padding: 20px; text-align: center; box-shadow: 0 0 50px rgba(188, 19, 254, 0.2); 
            position: relative;
        }

        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-menu {
            text-decoration: none; color: #fff; background: rgba(188, 19, 254, 0.2);
            border: 1px solid var(--primary); padding: 8px 18px; border-radius: 12px;
            font-size: 11px; font-weight: 900; text-transform: uppercase;
        }

        /* ИГРОВАЯ СЕТКА */
        .board {
            display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px;
            background: #111; padding: 6px; border-radius: 15px; margin-bottom: 20px;
        }
        .cell { aspect-ratio: 1; background: #050505; border-radius: 4px; border: 1px solid #222; }
        .cell.filled { border: none; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); transition: 0.3s; }
        .cell.highlight { background: rgba(188, 19, 254, 0.2); }

        /* ЦВЕТА БЛОКОВ */
        .c1 { background: #ff3b30; box-shadow: 0 0 15px #ff3b30; }
        .c2 { background: #00ff88; box-shadow: 0 0 15px #00ff88; }
        .c3 { background: #bc13fe; box-shadow: 0 0 15px #bc13fe; }
        .c4 { background: #007aff; box-shadow: 0 0 15px #007aff; }

        /* ПАНЕЛЬ ФИГУР */
        .piece-container { display: flex; justify-content: space-around; align-items: center; height: 120px; background: #050505; border-radius: 20px; border: 1px solid #222; }
        .piece { display: grid; gap: 2px; cursor: grab; padding: 5px; touch-action: none; }
        .p-block { aspect-ratio: 1; border-radius: 3px; width: 22px; }

        .stats { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .stat-box { background: #000; padding: 10px; border-radius: 12px; border: 1px solid #222; flex: 1; margin: 0 5px; }
        .stat-label { font-size: 8px; color: #666; display: block; }
        .stat-val { font-size: 14px; color: var(--win); font-weight: 900; }
    </style>
</head>
<body>

    <audio id="track" loop preload="auto"></audio>

    <div class="logo-box">
        <span class="top">BLOCK</span>
        <span class="bot">SLEEPKIDD</span>
    </div>

    <div class="player-bar">
        <button class="p-btn" onclick="prevTrack()">◀</button>
        <div class="disk"></div>
        <button class="p-btn" onclick="nextTrack()">▶</button>
        <marquee id="track-title" style="font-size: 9px; color: var(--primary); font-weight: 900; flex: 1; margin-left: 10px;">LOADING...</marquee>
    </div>

    <div class="container">
        <div class="top-nav">
            <a href="index.html" class="btn-menu">МЕНЮ</a>
            <span id="u-bal" style="color: var(--win); font-weight: 900; font-size: 1.2rem;">5 000₽</span>
        </div>

        <div class="stats">
            <div class="stat-box"><span class="stat-label">SCORE</span><span id="score" class="stat-val">0</span></div>
            <div class="stat-box"><span class="stat-label">NEXT PRIZE</span><span id="next-goal" class="stat-val">5,000</span></div>
        </div>

        <div class="board" id="board"></div>
        <div class="piece-container" id="pieces"></div>
    </div>

    <script>
        const playlist = [
            { name: "6 УТРА — В КАБИНЕ ФОТОГРАФИЯ ТВОЯ", src: "6utra.mp3" },
            { name: "ТРИННАДЦАТЬ КАРАТ — ЖВАЧКА", src: "zhvachka.mp3" }
        ];
        let currentTrackIndex = localStorage.getItem('trackIdx') ? parseInt(localStorage.getItem('trackIdx')) : 0;
        const audio = document.getElementById('track');

        let balance, score = 0, nextGoal = 5000;
        let grid = Array(64).fill(0);
        let currentDrag = null;

        const shapes = [
            [[1,1],[1,1]], // Квадрат
            [[1,1,1]],     // Линия 3
            [[1],[1],[1]], // Вертикаль 3
            [[1,0],[1,1]], // Уголок
            [[1,1,1,1]],   // Линия 4
            [[1,1,1],[0,1,0]] // T-образная
        ];

        window.onload = () => {
            balance = parseInt(localStorage.getItem('bal')?.replace(/\s/g, '') || 5000);
            updateUI();
            initBoard();
            spawnPieces();
            updatePlayer();
        };

        function initBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for(let i=0; i<64; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                boardEl.appendChild(cell);
            }
        }

        function spawnPieces() {
            const container = document.getElementById('pieces');
            container.innerHTML = '';
            for(let i=0; i<3; i++) {
                const shape = shapes[Math.floor(Math.random()*shapes.length)];
                const color = `c${Math.floor(Math.random()*4)+1}`;
                const p = document.createElement('div');
                p.className = 'piece';
                p.draggable = true;
                p.style.gridTemplateColumns = `repeat(${shape[0].length}, 1fr)`;
                
                shape.forEach(row => {
                    row.forEach(b => {
                        const block = document.createElement('div');
                        block.className = b ? `p-block ${color}` : '';
                        p.appendChild(block);
                    });
                });

                p.onmousedown = (e) => startDrag(e, shape, color, p);
                p.ontouchstart = (e) => startDrag(e.touches[0], shape, color, p);
                container.appendChild(p);
            }
        }

        function startDrag(e, shape, color, el) {
            audio.play().catch(() => {});
            currentDrag = { shape, color, el };
            el.style.opacity = '0.4';
        }

        document.onmouseup = document.ontouchend = (e) => {
            if(!currentDrag) return;
            const x = e.clientX || e.changedTouches[0].clientX;
            const y = e.clientY || e.changedTouches[0].clientY;
            const target = document.elementFromPoint(x, y);
            
            if(target && target.classList.contains('cell')) {
                const idx = Array.from(document.getElementById('board').children).indexOf(target);
                tryPlace(idx);
            }
            
            currentDrag.el.style.opacity = '1';
            currentDrag = null;
        };

        function tryPlace(idx) {
            const { shape, color, el } = currentDrag;
            const r = Math.floor(idx / 8);
            const c = idx % 8;

            for(let i=0; i<shape.length; i++) {
                for(let j=0; j<shape[i].length; j++) {
                    if(shape[i][j]) {
                        let tr = r + i, tc = c + j;
                        if(tr >= 8 || tc >= 8 || grid[tr*8+tc]) return;
                    }
                }
            }

            // Успешная вставка
            for(let i=0; i<shape.length; i++) {
                for(let j=0; j<shape[i].length; j++) {
                    if(shape[i][j]) {
                        let targetIdx = (r + i) * 8 + (c + j);
                        grid[targetIdx] = 1;
                        document.getElementById('board').children[targetIdx].className = `cell filled ${color}`;
                    }
                }
            }
            el.style.visibility = 'hidden';
            addScore(200);
            checkLines();
            if([...document.querySelectorAll('.piece')].every(p => p.style.visibility === 'hidden')) spawnPieces();
        }

        function checkLines() {
            let toClear = [];
            for(let i=0; i<8; i++) {
                if(grid.slice(i*8, i*8+8).every(x => x)) toClear.push({type:'r', v:i});
                let col = [];
                for(let j=0; j<8; j++) col.push(grid[j*8+i]);
                if(col.every(x => x)) toClear.push({type:'c', v:i});
            }

            toClear.forEach(l => {
                addScore(500);
                if(l.type === 'r') {
                    for(let j=0; j<8; j++) { grid[l.v*8+j]=0; document.getElementById('board').children[l.v*8+j].className='cell'; }
                } else {
                    for(let j=0; j<8; j++) { grid[j*8+l.v]=0; document.getElementById('board').children[j*8+l.v].className='cell'; }
                }
            });
        }

        function addScore(p) {
            score += p;
            if(score >= nextGoal) {
                balance += 5000;
                nextGoal += 5000;
                alert("BONUS: +5,000₽");
                save();
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = balance.toLocaleString() + "₽";
            document.getElementById('score').innerText = score.toLocaleString();
            document.getElementById('next-goal').innerText = nextGoal.toLocaleString();
        }

        function save() { localStorage.setItem('bal', balance.toLocaleString()); }

        // ПЛЕЕР
        function updatePlayer(playNow = false) {
            const track = playlist[currentTrackIndex];
            document.getElementById('track-title').innerText = `SYSTEM: ${track.name}`;
            if (!audio.src.includes(track.src)) audio.src = track.src;
            if (playNow) audio.play();
            localStorage.setItem('trackIdx', currentTrackIndex);
        }
        function nextTrack() { currentTrackIndex = (currentTrackIndex + 1) % playlist.length; updatePlayer(true); }
        function prevTrack() { currentTrackIndex = (currentTrackIndex - 1 + playlist.length) % playlist.length; updatePlayer(true); }
    </script>
</body>
</html>
