<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MINES SLEEPKIDD — ELITE EDITION</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --bg: #000; --win: #00ff88; --lose: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); margin: 0; display: flex; flex-direction: column; 
            align-items: center; font-family: 'Orbitron', sans-serif; color: #fff; 
            min-height: 100vh; overflow-x: hidden;
        }

        /* ГИПЕР-ГЛИТЧ ЛОГОТИП */
        .logo-box { margin: 25px 0 10px; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-12deg); text-align: center; position: relative; }
        .logo-box .top { 
            font-size: 24px; color: var(--primary); display: block; 
            text-shadow: 0 0 15px var(--primary); position: relative;
            animation: hyperGlitch 1.5s infinite;
        }
        .logo-box .top::before, .logo-box .top::after {
            content: 'MINES'; position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0;
        }
        .logo-box .top::before { color: #00f6ff; z-index: -1; animation: rgbSplit 1.5s infinite; }
        .logo-box .top::after { color: #ff00de; z-index: -2; animation: rgbSplit 1.5s infinite reverse; }

        @keyframes hyperGlitch { 0%, 100% { transform: translate(0); } 16% { transform: translate(-4px, 2px); } 81% { transform: translate(2px, 2px); } }
        @keyframes rgbSplit { 0%, 15%, 19%, 80%, 84%, 100% { opacity: 0; transform: translate(0); } 16%, 18% { opacity: 1; transform: translate(-8px, 0); } }
        .logo-box .bot { font-size: 38px; color: #fff; letter-spacing: -2px; line-height: 0.8; }

        /* ПЛЕЕР */
        .player-bar { 
            width: 95%; max-width: 400px; background: rgba(188, 19, 254, 0.1); 
            border: 1px solid var(--primary); border-radius: 100px; 
            padding: 8px 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 0 15px rgba(188, 19, 254, 0.2);
        }
        .disk { width: 22px; height: 22px; border: 2px solid var(--primary); border-radius: 50%; animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* КОНТЕЙНЕР */
        .container { 
            width: 95%; max-width: 400px; background: #0a0a0a; 
            border: 2px solid var(--primary); border-radius: 40px; 
            padding: 20px; text-align: center; 
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.3); position: relative; 
        }
        
        .top-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .btn-menu {
            text-decoration: none; color: #fff; background: rgba(188, 19, 254, 0.2);
            border: 1px solid var(--primary); padding: 8px 18px; border-radius: 12px;
            font-size: 11px; font-weight: 900; text-transform: uppercase; transition: 0.3s;
        }
        .btn-menu:hover { background: var(--primary); box-shadow: 0 0 20px var(--primary); }

        /* СЕТКА */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin: 15px 0; }
        .cell { 
            aspect-ratio: 1/1; background: #111; border-radius: 12px; border: 1px solid #222; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            font-size: 1.5rem; transition: 0.3s; 
        }
        .cell:hover { border-color: var(--primary); background: #1a1a1a; box-shadow: 0 0 15px rgba(188, 19, 254, 0.3); }
        .cell.win { background: rgba(0, 255, 136, 0.1); border-color: var(--win); color: var(--win); text-shadow: 0 0 10px var(--win); animation: pulse 0.4s; }
        .cell.lose { background: rgba(255, 77, 77, 0.1); border-color: var(--lose); color: var(--lose); text-shadow: 0 0 10px var(--lose); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* УПРАВЛЕНИЕ */
        .controls { background: #050505; padding: 15px; border-radius: 25px; border: 1px solid #111; }
        .setup { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.7rem; color: #555; font-weight: 900; }
        
        select, input { background: #000; color: #fff; border: 1.5px solid #222; padding: 10px; border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; text-align: center; }
        input { width: 100%; font-size: 1.4rem; margin-bottom: 15px; }

        .btn-action {
            width: 100%; height: 75px; border: none; border-radius: 20px;
            font-weight: 900; font-size: 1.6rem; text-transform: uppercase; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #btn-start { background: linear-gradient(180deg, var(--primary), #8a0db8); color: #fff; box-shadow: 0 0 25px rgba(188, 19, 254, 0.4); }
        #btn-cash { background: linear-gradient(180deg, var(--win), #00b35f); color: #000; display: none; box-shadow: 0 0 25px rgba(0, 255, 136, 0.4); }
    </style>
</head>
<body>

    <!-- АУДИО ТЕГ -->
    <audio id="track" loop preload="auto">
        <source src="6utra.mp3" type="audio/mpeg">
    </audio>

    <div class="logo-box">
        <span class="top">MINES</span>
        <span class="bot">SLEEPKIDD</span>
    </div>

    <div class="player-bar">
        <div class="disk"></div>
        <marquee style="font-size: 10px; color: var(--primary); font-weight: 900; flex: 1;">PLAYING: 6 УТРА — В КАБИНЕ ФОТОГРАФИЯ ТВОЯ...</marquee>
    </div>
    
    <div class="container">
        <div class="top-nav">
            <a href="index.html" class="btn-menu">МЕНЮ</a>
            <span style="color:var(--win); font-weight: 900; font-size: 1.3rem;" id="u-bal">5 000₽</span>
        </div>
        
        <div class="grid" id="grid"></div>
        
        <div class="controls">
            <div class="setup">
                <span>ACTIVE_MINES:</span>
                <select id="mines-count" style="width: 70px;">
                    <option value="1">1</option><option value="3" selected>3</option>
                    <option value="5">5</option><option value="10">10</option>
                    <option value="20">20</option>
                </select>
            </div>
            <input type="number" id="bet" value="100">
            
            <button class="btn-action" id="btn-start" onclick="startGame()">ИНИЦИАЛИЗАЦИЯ</button>
            <button class="btn-action" id="btn-cash" onclick="cashOut()">
                ЗАБРАТЬ<br><span id="win-sum" style="font-size: 1.1rem; opacity: 0.8;">0₽</span>
            </button>
        </div>
    </div>

    <script>
        let balance, bet, mines = [], opened = 0, active = false;
        
        window.onload = () => {
            balance = parseInt(localStorage.getItem('bal')?.replace(/\s/g, '') || 5000);
            updateUI();
            createGrid();
        };

        function createGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.onclick = () => openCell(i, cell);
                grid.appendChild(cell);
            }
        }

        function startGame() {
            // ЗАПУСК МУЗЫКИ ПРИ ПЕРВОМ КЛИКЕ
            const audio = document.getElementById('track');
            audio.play().catch(e => console.log("Audio waiting..."));
            audio.volume = 0.5;

            bet = parseInt(document.getElementById('bet').value);
            if(bet > balance || bet <= 0) return alert("Мало кэша!");
            
            balance -= bet; save();
            active = true; opened = 0; mines = [];
            
            let mCount = parseInt(document.getElementById('mines-count').value);
            while(mines.length < mCount) {
                let r = Math.floor(Math.random()*25);
                if(!mines.includes(r)) mines.push(r);
            }

            createGrid();
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'flex';
            document.getElementById('mines-count').disabled = true;
            document.getElementById('bet').disabled = true;
            updateWinSum();
        }

        function openCell(i, c) {
            if(!active || c.classList.contains('win')) return;
            
            if(mines.includes(i)) { 
                c.classList.add('lose'); c.innerText = '💣'; 
                active = false;
                mines.forEach(m => {
                    const cell = document.getElementById('grid').children[m];
                    cell.classList.add('lose'); cell.innerText = '💣';
                });
                setTimeout(reset, 2000); 
            } else { 
                c.classList.add('win'); c.innerText = '💎'; 
                opened++; 
                updateWinSum();
            }
        }

        function getMult() {
            let total = 25;
            let m = parseInt(document.getElementById('mines-count').value);
            let mult = 1;
            for(let i=0; i<opened; i++) mult *= (total - i) / (total - m - i);
            return mult;
        }

        function updateWinSum() {
            let win = Math.floor(bet * getMult());
            document.getElementById('win-sum').innerText = win + "₽";
        }

        function cashOut() {
            if(!active || opened === 0) return;
            balance += Math.floor(bet * getMult());
            save(); reset();
        }

        function reset() { 
            active = false;
            document.getElementById('btn-start').style.display = 'flex';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('mines-count').disabled = false;
            document.getElementById('bet').disabled = false;
            createGrid();
        }

        function save() {
            document.getElementById('u-bal').innerText = balance.toLocaleString() + "₽";
            localStorage.setItem('bal', balance.toLocaleString());
        }

        function updateUI() {
            document.getElementById('u-bal').innerText = balance.toLocaleString() + "₽";
        }
    </script>
</body>
</html>
