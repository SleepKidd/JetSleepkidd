<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — ELITE CLOUD</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { --primary: #bc13fe; --bg: #000; --win: #00ff88; --glass: rgba(255, 255, 255, 0.02); }
        * { box-sizing: border-box; outline: none; }
        body { background: #000; color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; position: relative; }
        
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .aura { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 800px; background: radial-gradient(circle, rgba(188, 19, 254, 0.08) 0%, transparent 70%); z-index: -1; animation: auraMove 15s infinite alternate ease-in-out; }
        @keyframes auraMove { from { transform: translate(-55%, -45%); } to { transform: translate(-45%, -55%); } }

        /* ЛОГОТИП */
        .logo-box { margin: 60px 0 30px; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-12deg); text-align: center; }
        .logo-box .top { font-size: 32px; color: var(--primary); display: block; text-shadow: 0 0 15px var(--primary); animation: hyperGlitch 1.5s infinite; }
        .logo-box .bot { font-size: 48px; color: #fff; letter-spacing: -2px; line-height: 0.8; }
        @keyframes hyperGlitch { 0%, 90% { transform: translate(0); } 92% { transform: translate(-3px, 1px); } 94% { transform: translate(3px, -1px); } }

        .container { width: 95%; max-width: 850px; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; z-index: 10; }

        /* ОКНО ВХОДА - ТЕПЕРЬ ВИДИМО СРАЗУ */
        #scr-auth { width: 100%; max-width: 400px; background: rgba(10, 10, 10, 0.9); padding: 45px; border-radius: 50px; border: 2px solid var(--primary); text-align: center; box-shadow: 0 0 50px rgba(188, 19, 254, 0.2); backdrop-filter: blur(30px); margin-top: 30px; }
        .btn-google { background: #fff; color: #000; border: none; padding: 20px; border-radius: 18px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 12px; transition: 0.3s; }
        .btn-google:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(255, 255, 255, 0.3); }

        /* ЛОББИ */
        #scr-lobby { display: none; width: 100%; }
        .reveal { opacity: 0; transform: translateY(30px); animation: revealUp 0.6s forwards; }
        @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }

        .user-bar { width: 100%; background: var(--glass); padding: 25px 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; backdrop-filter: blur(25px); }
        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; width: 100%; }
        .game-card { background: rgba(10, 10, 10, 0.6); border-radius: 45px; border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden; transition: 0.5s; text-decoration: none; color: #fff; backdrop-filter: blur(15px); }
        .game-card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 0 40px rgba(188, 19, 254, 0.3); }
        .preview { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 6rem; background: radial-gradient(circle, #0f0f0f, #000); }
        .logout { margin-top: 60px; color: #444; font-size: 0.95rem; cursor: pointer; text-transform: uppercase; font-weight: 900; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>
    <div class="aura"></div>

    <div class="logo-box">
        <span class="top">JET</span>
        <span class="bot">SLEEPKIDD</span>
    </div>

    <div class="container">
        <!-- ОКНО ВХОДА -->
        <div id="scr-auth">
            <button class="btn-google" onclick="loginWithGoogle()">
                <img src="https://gstatic.com" width="20">
                Войти через Google
            </button>
        </div>

        <!-- ЛОББИ -->
        <div id="scr-lobby">
            <div class="user-bar reveal">
                <div>
                    <small style="color: #666; display: block; font-size: 0.8rem; font-weight: 900;">ВАШЕ ИМЯ</small>
                    <span id="u-name" style="font-weight: 900; font-size: 1.5rem; color: var(--primary);">---</span>
                </div>
                <div style="color: var(--win); font-weight: 900; font-size: 2.2rem;" id="u-bal">0 ₽</div>
            </div>

            <div class="games-grid">
                <a href="jet.html" class="game-card reveal" style="animation-delay: 0.2s;"><div class="preview">🚀</div><div style="padding:30px;"><h3>JET ENGINE</h3><p>Множители до 500x.</p></div></a>
                <a href="mines.html" class="game-card reveal" style="animation-delay: 0.4s;"><div class="preview">💣</div><div style="padding:30px;"><h3>MINES PRO</h3><p>Найди путь сквозь 25 секторов.</p></div></a>
                <a href="cubes.html" class="game-card reveal" style="animation-delay: 0.6s;"><div class="preview">🎲</div><div style="padding:30px;"><h3>CUBES 3D</h3><p>Испытай удачу в 3D броске.</p></div></a>
            </div>
            <div class="logout reveal" onclick="logout()">ВЫЙТИ ИЗ АККАУНТА</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://gstatic.com";
        import { getFirestore, doc, getDoc, setDoc } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyCbuze00_buewrMCBDxn7FRv3COFuIxHK_0",
            authDomain: "://firebaseapp.com",
            projectId: "jetsleepkidd",
            storageBucket: "jetsleepkidd.firebasestorage.app",
            messagingSenderId: "234214215216",
            appId: "1:234214215216:web:6db8f3186723a7d4c7e7f5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        window.loginWithGoogle = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                if (!userSnap.exists()) { await setDoc(userRef, { name: user.displayName, bal: 10000 }); }
            } catch (e) { alert("Ошибка авторизации! Проверь Authorized Domains в Firebase."); }
        };

        onAuthStateChanged(auth, async (user) => {
            const authScr = document.getElementById('scr-auth');
            const lobbyScr = document.getElementById('scr-lobby');
            if (user) {
                const userSnap = await getDoc(doc(db, "users", user.uid));
                const data = userSnap.data();
                authScr.style.display = 'none';
                lobbyScr.style.display = 'block';
                document.getElementById('u-name').innerText = user.displayName.toUpperCase();
                document.getElementById('u-bal').innerText = Math.floor(data.bal).toLocaleString() + ' ₽';
                localStorage.setItem('uid', user.uid);
            } else {
                authScr.style.display = 'block';
                lobbyScr.style.display = 'none';
            }
        });

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>

    <script>
        const cvs = document.getElementById('starfield');
        const ctx = cvs.getContext('2d');
        let stars = [];
        function initStars() {
            cvs.width = window.innerWidth; cvs.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) stars.push({x: Math.random()*cvs.width, y: Math.random()*cvs.height, s: Math.random()*1.5, sp: Math.random()*0.4, op: Math.random()});
        }
        function drawStars() {
            ctx.clearRect(0,0,cvs.width, cvs.height);
            stars.forEach(s => { ctx.globalAlpha = s.op; ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, Math.PI*2); ctx.fill(); s.y += s.sp; if(s.y > cvs.height) s.y = -5; });
            requestAnimationFrame(drawStars);
        }
        window.addEventListener('resize', initStars); initStars(); drawStars();
    </script>
</body>
</html>
