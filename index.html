<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — ELITE LOBBY</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --primary: #bc13fe; 
            --bg: #000000; 
            --win: #00ff88; 
            --lose: #ff4d4d; 
            --glass: rgba(255, 255, 255, 0.02);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            overflow-x: hidden; 
            position: relative;
        }

        /* КОСМИЧЕСКИЙ ФОН */
        #starfield { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .aura {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.08) 0%, transparent 70%);
            z-index: -1; animation: auraMove 15s infinite alternate ease-in-out;
        }
        @keyframes auraMove { from { transform: translate(-55%, -45%); } to { transform: translate(-45%, -55%); } }

        /* ЛОГОТИП */
        .logo-box { margin: 45px 0 30px; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-12deg); text-align: center; position: relative; }
        .logo-box .top { 
            font-size: 32px; color: var(--primary); display: block; 
            text-shadow: 0 0 15px var(--primary); animation: hyperGlitch 1.5s infinite;
        }
        @keyframes hyperGlitch { 0%, 100% { transform: translate(0); } 20% { transform: translate(-2px, 1px); } 40% { transform: translate(2px, -1px); } }
        .logo-box .bot { font-size: 48px; color: #fff; letter-spacing: -2px; line-height: 0.8; }

        .container { width: 95%; max-width: 850px; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; z-index: 10; }

        /* АВТОРИЗАЦИЯ */
        #scr-auth { 
            width: 100%; max-width: 400px; background: rgba(10, 10, 10, 0.85); 
            padding: 45px; border-radius: 50px; border: 1px solid rgba(188, 19, 254, 0.2); 
            text-align: center; box-shadow: 0 0 50px rgba(188, 19, 254, 0.1); 
            backdrop-filter: blur(30px); margin-top: 30px;
        }
        input { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #fff; padding: 20px; width: 100%; border-radius: 15px; 
            margin-bottom: 20px; text-align: center; font-family: 'Orbitron'; 
            font-size: 1.3rem; font-weight: 900;
        }
        .btn-go { 
            background: linear-gradient(180deg, var(--primary), #8a0db8); 
            border: none; color: #fff; padding: 22px; border-radius: 18px; 
            font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; 
            font-size: 1.8rem; transition: 0.3s;
        }

        /* ЛОББИ */
        #scr-lobby { display: none; width: 100%; }
        .reveal { opacity: 0; transform: translateY(30px); animation: revealUp 0.6s forwards; }
        @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }

        /* ПЛЕЕР */
        .music-player {
            display: flex; align-items: center; gap: 15px;
            background: rgba(188, 19, 254, 0.1); padding: 12px 25px;
            border-radius: 100px; border: 1px solid var(--primary);
            margin-bottom: 25px; backdrop-filter: blur(10px);
        }
        .disk { width: 30px; height: 30px; background: var(--primary); border-radius: 50%; animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .user-bar { 
            width: 100%; background: var(--glass); 
            padding: 25px 40px; border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px;
        }

        .games-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; width: 100%; }
        .game-card { 
            background: rgba(10, 10, 10, 0.6); border-radius: 45px; 
            border: 1px solid rgba(255,255,255,0.05); 
            overflow: hidden; transition: 0.5s; 
            text-decoration: none; color: #fff;
        }
        .game-card:hover { border-color: var(--primary); transform: translateY(-10px); }
        .preview { height: 180px; display: flex; align-items: center; justify-content: center; font-size: 6rem; background: #000; }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>
    <div class="aura"></div>

    <!-- АУДИО (Файл 6utra.mp3 в корне GitHub) -->
    <audio id="audio-track" loop>
        <source src="6utra.mp3" type="audio/mpeg">
    </audio>

    <div class="logo-box">
        <span class="top">JET</span>
        <span class="bot">SLEEPKIDD</span>
    </div>

    <div class="container">
        <div id="scr-auth">
            <input type="text" id="log" placeholder="ЛОГИН">
            <input type="password" id="pas" placeholder="ПАРОЛЬ">
            <button class="btn-go" onclick="login()">ВОЙТИ</button>
        </div>

        <div id="scr-lobby">
            <div class="music-player reveal">
                <div class="disk"></div>
                <div style="font-size: 0.7rem; font-weight: 900;">
                    PLAYING: <span style="color: var(--primary);">6 УТРА — В КАБИНЕ ФОТОГРАФИЯ ТВОЯ</span>
                </div>
            </div>

            <div class="user-bar reveal">
                <div>
                    <small style="color: #666; display: block; font-size: 0.8rem; font-weight: 900;">USER</small>
                    <span id="u-name" style="font-weight: 900; font-size: 1.6rem; color: var(--primary);">---</span>
                </div>
                <div style="color: var(--win); font-weight: 900; font-size: 2.2rem;">50 000₽</div>
            </div>

            <div class="games-grid">
                <a href="jet.html" class="game-card reveal" style="animation-delay: 0.2s;">
                    <div class="preview">🚀</div>
                    <div style="padding:30px;"><h3 style="margin:0; color:var(--primary);">JET GAME</h3></div>
                </a>
                <a href="mines.html" class="game-card reveal" style="animation-delay: 0.4s;">
                    <div class="preview">💣</div>
                    <div style="padding:30px;"><h3 style="margin:0; color:var(--primary);">MINES PRO</h3></div>
                </a>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const user = document.getElementById('log').value;
            const audio = document.getElementById('audio-track');

            if(user.length > 0) {
                audio.play(); // Старт музыки
                audio.volume = 0.5;

                document.getElementById('scr-auth').style.display = 'none';
                document.getElementById('scr-lobby').style.display = 'block';
                document.getElementById('u-name').innerText = user.toUpperCase();
            }
        }

        // КАНВАС ЗВЕЗД
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.5;
            }
            draw() {
                ctx.fillStyle = "#bc13fe";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                ctx.fill();
                this.y += this.speed;
                if(this.y > canvas.height) this.y = 0;
            }
        }

        let stars = Array.from({length: 100}, () => new Star());
        function animate() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            stars.forEach(s => s.draw());
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
