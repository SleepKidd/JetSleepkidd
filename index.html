<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — КАЗИНО</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #bc13fe;
            --bg: #030303;
            --win: #00ff88;
            --lose: #ff4d4d;
            --accent: #ffcc00;
            --glass: rgba(255, 255, 255, 0.05);
            --star-speed: 4s;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 420px;
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(25px);
            border: 2px solid var(--primary);
            border-radius: 50px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 0 60px rgba(188, 19, 254, 0.3);
            position: relative;
        }

        .global-logo {
            margin-bottom: 20px;
            font-family: 'Rubik Mono One', sans-serif;
            transform: skewX(-12deg);
        }

        .logo-top {
            font-size: 26px;
            color: var(--primary);
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 15px var(--primary);
        }

        .logo-bottom {
            font-size: 34px;
            color: #fff;
            display: block;
            margin-top: -5px;
        }

        .rank-container {
            margin-bottom: 20px;
        }

        .rank-bar {
            width: 100%;
            height: 5px;
            background: #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 5px;
        }

        .rank-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--win));
            transition: 1s ease;
        }

        .screen {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .active-screen {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #555 !important;
        }

        input {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 16px;
            border-radius: 20px;
            width: 100%;
            text-align: center;
            font-family: 'Orbitron';
            font-size: 1.1rem;
            margin-bottom: 12px;
        }

        .main-btn {
            width: 100%;
            padding: 20px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.3rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: 0.2s;
        }

            .main-btn:active {
                transform: scale(0.97);
            }

        .cashout-btn {
            background: var(--win);
            color: #000;
            display: none;
        }

        .game-area {
            height: 240px;
            background: #000;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .nebula {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(188, 19, 254, 0.1) 0%, transparent 70%);
            filter: blur(50px);
            animation: nebulaMove 15s linear infinite;
        }

        @keyframes nebulaMove {
            from {
                transform: translate(-25%, -25%);
            }

            to {
                transform: translate(0%, 0%);
            }
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: starMove var(--star-speed) linear infinite;
        }

        @keyframes starMove {
            from {
                transform: translateY(-10px);
            }

            to {
                transform: translateY(260px);
            }
        }

        .multiplier {
            font-size: 4rem;
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            color: var(--win);
            text-shadow: 0 0 30px rgba(0,255,136,0.5);
        }

        .gold-x {
            color: var(--accent) !important;
            text-shadow: 0 0 40px var(--accent) !important;
        }

        .hero-wrap {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 5;
            transition: transform 0.1s linear, filter 0.3s;
        }

        .character {
            font-size: 55px;
            filter: drop-shadow(0 0 15px var(--primary));
        }

        .jet-fire {
            position: absolute;
            bottom: -8px;
            left: 6px;
            width: 35px;
            height: 35px;
            background: orange;
            filter: blur(12px);
            border-radius: 50%;
            animation: firePulse 0.05s infinite;
        }

        @keyframes firePulse {
            0% {
                transform: scale(1);
                opacity: 0.9;
            }

            100% {
                transform: scale(1.4);
                opacity: 0.5;
            }
        }

        .spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        .game-stats {
            display: flex;
            justify-content: space-between;
            background: var(--glass);
            padding: 12px;
            border-radius: 15px;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }

        .history-row {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 10px;
            height: 28px;
            overflow: hidden;
        }

        .hist-chip {
            font-size: 0.65rem;
            padding: 5px 10px;
            border-radius: 10px;
            background: var(--glass);
            font-weight: bold;
        }

        .auto-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 15px;
            background: var(--glass);
            padding: 10px;
            border-radius: 15px;
        }

        .auto-item label {
            font-size: 0.55rem;
            color: #777;
            display: block;
            margin-bottom: 3px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 32px;
            height: 16px;
        }

            .switch input {
                opacity: 0;
                width: 0;
                height: 0;
            }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            border-radius: 20px;
            transition: .4s;
        }

            .slider:before {
                position: absolute;
                content: "";
                height: 10px;
                width: 10px;
                left: 3px;
                bottom: 3px;
                background-color: white;
                border-radius: 50%;
                transition: .4s;
            }

        input:checked + .slider {
            background-color: var(--primary);
        }

            input:checked + .slider:before {
                transform: translateX(16px);
            }

        .crashed {
            filter: grayscale(1) sepia(1) hue-rotate(-50deg) saturate(5) !important;
            animation: shake 0.1s infinite !important;
        }

        @keyframes shake {
            0% {
                transform: translate(1px, 1px);
            }

            50% {
                transform: translate(-1px, -1px);
            }

            100% {
                transform: translate(1px, -1px);
            }
        }

        .coin {
            position: absolute;
            font-size: 20px;
            z-index: 100;
            animation: coinFall 1s linear forwards;
        }

        @keyframes coinFall {
            from {
                transform: translateY(-50px);
                opacity: 1;
            }

            to {
                transform: translateY(400px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="main-frame">
        <div class="global-logo">
            <h1 class="logo-top">JET</h1>
            <span class="logo-bottom">SLEEPKIDD</span>
        </div>

        <div class="rank-container" id="rank-box" style="display:none;">
            <div style="display:flex; justify-content:space-between; font-size: 0.6rem; color: #555;">
                <span id="rank-name">РАНГ: ПАССАЖИР</span>
                <span id="rank-perc">0%</span>
            </div>
            <div class="rank-bar"><div class="rank-fill" id="rank-ui"></div></div>
        </div>

        <!-- AUTH -->
        <div id="scr-auth" class="screen active-screen">
            <input type="text" id="login" placeholder="ЛОГИН">
            <input type="password" id="pass" placeholder="ПАРОЛЬ">
            <button class="main-btn" onclick="auth()">ВЗЛЕТАЕМ</button>
            <p style="font-size: 0.7rem; color: #444; margin-top: 10px;">test / test — Админка</p>
        </div>

        <!-- GAME -->
        <div id="scr-game" class="screen">
            <div class="history-row" id="hist-list"></div>
            <div class="game-stats">
                <span id="ui-nick" style="color: #666;">---</span>
                <span id="ui-bal" style="color: var(--win); font-weight: 900;">---</span>
            </div>

            <div class="game-area" id="area">
                <div class="nebula"></div>
                <div id="stars-container"></div>
                <div class="multiplier" id="mult">1.00x</div>
                <div class="hero-wrap" id="hero-wrap">
                    <div class="jet-fire" id="fire"></div>
                    <div class="character">🚀</div>
                </div>
            </div>

            <div class="auto-panel">
                <div class="auto-item">
                    <label>АВТО-СТАВКА</label>
                    <label class="switch"><input type="checkbox" id="auto-bet"><span class="slider"></span></label>
                </div>
                <div class="auto-item">
                    <label>АВТО-ВЫВОД</label>
                    <input type="number" id="auto-cash-val" value="2.00" step="0.1" style="width:50px; padding:2px; margin:0; font-size:0.6rem; height:18px; border-radius:5px;">
                    <label class="switch"><input type="checkbox" id="auto-cash"><span class="slider"></span></label>
                </div>
            </div>

            <input type="number" id="bet" value="50" inputmode="numeric">
            <button class="main-btn" id="btn-start" onclick="fly()">СТАВКА</button>
            <button class="main-btn cashout-btn" id="btn-cash" onclick="collect()">ЗАБРАТЬ <br> <small id="win-sum">0</small></button>
            <div id="msg" style="margin-top:10px; font-weight:bold; height:20px; font-size:0.8rem;"></div>
            <div style="margin-top:15px; color:#222; font-size:0.6rem; cursor:pointer;" onclick="location.reload()">ВЫЙТИ</div>
        </div>
    </div>

    <script>
        let balance = 500;
        let user = "";
        let isFlying = false;
        let currentX = 1.00;
        let timer, sparkTimer;
        let crashAt;
        let currentBet = 0;
        let history = [];

        // Stars
        const starsContainer = document.getElementById('stars-container');
        for (let i = 0; i < 30; i++) {
            let s = document.createElement('div');
            s.className = 'star';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
            s.style.animationDelay = Math.random() * 4 + 's';
            starsContainer.appendChild(s);
        }

        if (!localStorage.getItem('users_jet')) {
            localStorage.setItem('users_jet', JSON.stringify({ "test": { pass: "test", bal: 500000, hist: [] } }));
        }

        function auth() {
            const l = document.getElementById('login').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();
            if (!l || !p) return alert("Введите данные!");
            let users = JSON.parse(localStorage.getItem('users_jet'));
            if (users[l] && users[l].pass === p) {
                user = l; balance = users[l].bal; history = users[l].hist || [];
            } else {
                users[l] = { pass: p, bal: 500, hist: [] };
                user = l; balance = 500;
                localStorage.setItem('users_jet', JSON.stringify(users));
            }
            document.getElementById('ui-nick').innerText = user.toUpperCase();
            document.getElementById('scr-auth').style.display = 'none';
            document.getElementById('scr-game').style.display = 'block';
            document.getElementById('rank-box').style.display = 'block';
            updateRankUI(); renderHist();
        }

        function updateRankUI() {
            let rName = "ПАССАЖИР"; let p = (balance / 1000) * 100;
            if (balance >= 1000) { rName = "ПИЛОТ"; p = (balance / 10000) * 100; }
            if (balance >= 10000) { rName = "АС"; p = (balance / 100000) * 100; }
            if (balance >= 100000) { rName = "ЛЕГЕНДА"; p = 100; }
            document.getElementById('rank-name').innerText = "РАНГ: " + rName;
            document.getElementById('rank-perc').innerText = Math.floor(Math.min(p, 100)) + "%";
            document.getElementById('rank-ui').style.width = Math.min(p, 100) + "%";
            document.getElementById('ui-bal').innerText = Math.floor(balance) + "₽";
        }

        function createSpark() {
            if (!isFlying) return;
            const spark = document.createElement('div');
            spark.className = 'spark';
            const wrap = document.getElementById('hero-wrap');
            spark.style.left = (wrap.offsetLeft + 15) + 'px';
            spark.style.top = (wrap.offsetTop + 40) + 'px';
            document.getElementById('area').appendChild(spark);
            let vx = -Math.random() * 5 - 2; let vy = Math.random() * 4 + 2; let op = 1;
            let anim = setInterval(() => {
                spark.style.left = (parseFloat(spark.style.left) + vx) + 'px';
                spark.style.top = (parseFloat(spark.style.top) + vy) + 'px';
                op -= 0.05; spark.style.opacity = op;
                if (op <= 0) { spark.remove(); clearInterval(anim); }
            }, 30);
        }

        function fly() {
            if (isFlying) return;
            currentBet = parseInt(document.getElementById('bet').value);
            if (currentBet > balance || currentBet <= 0) {
                document.getElementById('auto-bet').checked = false;
                return alert("Недостаточно средств!");
            }

            document.getElementById('bet').disabled = true;
            balance -= currentBet; updateRankUI(); updateDB();

            isFlying = true; currentX = 1.00;

            // --- МАТЕМАТИКА ХАРД-МОД ---
            let rand = Math.random() * 100;
            if (rand < 65) { crashAt = (Math.random() * 0.99 + 1.01).toFixed(2); }
            else if (rand < 90) { crashAt = (Math.random() * 5.99 + 2.01).toFixed(2); }
            else if (rand < 98) { crashAt = (Math.random() * 21.99 + 8.01).toFixed(2); }
            else if (rand < 99.95) { crashAt = (Math.random() * 468.99 + 30.01).toFixed(2); }
            else { crashAt = 500.00; }

            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'block';
            document.getElementById('msg').innerText = "";
            document.getElementById('mult').style.color = "var(--win)";
            document.getElementById('mult').classList.remove('gold-x');

            const h = document.getElementById('hero-wrap');
            h.classList.remove('crashed');
            h.style.opacity = "1";
            document.getElementById('fire').style.display = "block";
            sparkTimer = setInterval(createSpark, 100);

            timer = setInterval(() => {
                let inc = 0.01;
                if (currentX > 3) inc = 0.04;
                if (currentX > 15) inc = 0.2;
                if (currentX > 100) inc = 1.8;

                currentX += inc;
                if (currentX >= crashAt) currentX = parseFloat(crashAt);

                document.getElementById('mult').innerText = currentX.toFixed(2) + "x";
                document.getElementById('win-sum').innerText = Math.floor(currentBet * currentX) + "₽";

                if (currentX > 2.5) document.documentElement.style.setProperty('--star-speed', '0.7s');
                if (currentX > 50) document.getElementById('mult').classList.add('gold-x');

                h.style.left = Math.min(20 + (currentX - 1) * 60, 310) + 'px';
                h.style.bottom = Math.min(20 + (currentX - 1) * 45, 190) + 'px';

                if (document.getElementById('auto-cash').checked && currentX >= parseFloat(document.getElementById('auto-cash-val').value)) collect();
                if (currentX >= crashAt) crash();
            }, 80);
        }

        function crash() {
            clearInterval(timer); clearInterval(sparkTimer);
            isFlying = false;
            document.getElementById('mult').style.color = 'var(--lose)';
            document.getElementById('msg').innerHTML = `<span style="color:var(--lose)">УЛЕТЕЛ!</span>`;
            const h = document.getElementById('hero-wrap');
            h.classList.add('crashed');
            document.getElementById('fire').style.display = "none";
            document.documentElement.style.setProperty('--star-speed', '4s');
            addHist(currentX.toFixed(2));
            setTimeout(reset, 2500);
        }

        function collect() {
            if (!isFlying) return;
            clearInterval(timer); clearInterval(sparkTimer);
            const win = Math.floor(currentBet * currentX);
            balance += win; updateRankUI(); updateDB();
            addHist(currentX.toFixed(2));
            document.getElementById('msg').innerHTML = `<span style="color:var(--win)">ВИН +${win}₽</span>`;
            if (currentX >= 5) coinRain();
            isFlying = false;
            setTimeout(reset, 2500);
        }

        function coinRain() {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'coin'; c.innerText = '💰';
                    c.style.left = Math.random() * 90 + '%';
                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 1000);
                }, i * 100);
            }
        }

        function reset() {
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('bet').disabled = false;
            const h = document.getElementById('hero-wrap');
            h.style.cssText = "left: 20px; bottom: 20px; opacity: 1;";
            h.classList.remove('crashed');
            document.getElementById('fire').style.display = "block";
            if (document.getElementById('auto-bet').checked) setTimeout(fly, 1000);
        }

        function addHist(x) {
            history.unshift(x); if (history.length > 6) history.pop();
            renderHist(); updateDB();
        }

        function renderHist() {
            document.getElementById('hist-list').innerHTML = history.map(h => `<div class="hist-chip" style="color:${h >= 50 ? 'var(--accent)' : (h >= 2 ? 'var(--primary)' : '#555')}">${h}x</div>`).join('');
        }

        function updateDB() {
            let users = JSON.parse(localStorage.getItem('users_jet'));
            if (users && users[user]) {
                users[user].bal = balance; users[user].hist = history;
                localStorage.setItem('users_jet', JSON.stringify(users));
            }
        }
    </script>
</body>
</html>
