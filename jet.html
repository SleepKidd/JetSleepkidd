<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — ULTRA DESIGN</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        /* ПРИНУДИТЕЛЬНЫЙ ДИЗАЙН */
        :root { 
            --primary: #bc13fe !important; 
            --bg: #050505 !important; 
            --win: #00ff88 !important; 
            --lose: #ff4d4d !important; 
        }

        body { 
            background: radial-gradient(circle at 50% 50%, #1a0525 0%, #050505 100%) !important;
            margin: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            font-family: 'Orbitron', sans-serif !important;
        }

        /* ТО САМОЕ ЛЕГЕНДАРНОЕ ЛОГО — ТЕПЕРЬ ОНО ГИГАНТСКОЕ */
        .logo-box { 
            margin: 40px 0 !important; 
            font-family: 'Rubik Mono One', sans-serif !important; 
            transform: skewX(-15deg) !important; 
            text-align: center !important; 
        }
        .logo-box .top { 
            font-size: 28px !important; 
            color: var(--primary) !important; 
            text-shadow: 0 0 20px var(--primary) !important; 
        }
        .logo-box .bot { 
            font-size: 42px !important; 
            color: #fff !important; 
            letter-spacing: -2px !important;
            line-height: 0.8 !important;
        }

        /* КОНТЕЙНЕР С МОЩНЫМ НЕОНОМ */
        .container { 
            width: 95% !important; 
            max-width: 440px !important; 
            background: rgba(15, 15, 15, 0.98) !important; 
            border: 3px solid var(--primary) !important; 
            border-radius: 45px !important; 
            padding: 30px !important; 
            box-shadow: 0 0 50px rgba(188, 19, 254, 0.7) !important; 
            position: relative !important; 
        }

        /* ИСТОРИЯ: 4 ИКСА БЕЗ ПОЛЗУНКА */
        .history-line { 
            display: grid !important; 
            grid-template-columns: repeat(4, 1fr) !important; 
            gap: 10px !important; 
            margin-bottom: 20px !important;
            overflow: hidden !important;
        }
        .hist-item { 
            background: #000 !important; 
            border: 2px solid var(--primary) !important; 
            padding: 10px 0 !important; 
            border-radius: 15px !important; 
            font-weight: 900 !important;
            text-align: center !important;
        }

        /* ИГРОВОЕ ПОЛЕ */
        .game-area { 
            height: 260px !important; 
            background: #000 !important; 
            border-radius: 30px !important; 
            position: relative !important; 
            border: 2px solid rgba(188, 19, 254, 0.5) !important;
            margin-bottom: 20px !important;
        }

        /* ЖИРНАЯ КНОПКА С 3D ЭФФЕКТОМ */
        .main-btn { 
            width: 100% !important; 
            padding: 25px !important; 
            background: linear-gradient(180deg, var(--primary), #8a0db8) !important; 
            color: #fff !important; 
            border-radius: 25px !important; 
            border: none !important;
            font-weight: 900 !important; 
            font-size: 2rem !important; 
            cursor: pointer !important;
            box-shadow: 0 10px 0 #5e087d, 0 15px 30px rgba(188, 19, 254, 0.5) !important;
            transition: 0.1s !important;
        }
        .main-btn:active { 
            transform: translateY(6px) !important; 
            box-shadow: 0 4px 0 #5e087d !important; 
        }

        .cashout-btn { 
            background: linear-gradient(180deg, var(--win), #00b35f) !important; 
            color: #000 !important; 
            box-shadow: 0 10px 0 #008546, 0 15px 30px rgba(0, 255, 136, 0.4) !important;
            display: none;
        }

        input[type="number"] {
            width: 100% !important;
            background: #111 !important;
            border: 2px solid #333 !important;
            color: #fff !important;
            padding: 20px !important;
            border-radius: 20px !important;
            font-size: 1.8rem !important;
            font-weight: 900 !important;
            text-align: center !important;
            margin-bottom: 20px !important;
        }

        .character { font-size: 65px !important; filter: drop-shadow(0 0 20px var(--primary)) !important; }
        .win-x { color: var(--win) !important; border-color: var(--win) !important; }
        .lose-x { color: var(--lose) !important; border-color: var(--lose) !important; }
        .crashed { filter: grayscale(1) blur(4px) opacity(0.3) !important; }
    </style>
</head>
<body>

    <div class="logo-box">
        <span class="top">JET</span>
        <span class="bot">SLEEPKIDD</span>
    </div>
    
    <div class="container">
        <div class="history-line" id="history"></div>
        
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:1.2rem; font-weight:900;">
            <span id="nick" style="color:var(--primary)">PLAYER</span>
            <span id="bal" style="color:var(--win)">0₽</span>
        </div>

        <div class="game-area" id="area">
            <canvas id="star-canvas" style="position:absolute; width:100%; height:100%;"></canvas>
            <div id="mult" style="font-size:5rem; font-weight:900; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:var(--win); z-index:10;">1.00x</div>
            <div id="hero" style="position:absolute; bottom:30px; left:30px; z-index:5;">
                <div class="character">🚀</div>
            </div>
        </div>

        <input type="number" id="bet" value="50">

        <button class="main-btn" id="btn-start" onclick="fly()">СТАВКА</button>
        <button class="main-btn cashout-btn" id="btn-cash" onclick="collect()">ЗАБРАТЬ <br> <span id="win-sum">0</span>₽</button>
    </div>

    <script>
        let balance = 1000, currentBet, isFlying = false, currentX = 1.00, timer, crashAt;
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        window.onload = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const user = localStorage.getItem('current_user') || 'GUEST';
            const users = JSON.parse(localStorage.getItem('users_jet')) || {'GUEST': {bal: 1000}};
            balance = users[user].bal;
            document.getElementById('nick').innerText = user.toUpperCase();
            updateUI();
            drawStars();
        };

        function fly() {
            if (isFlying) return;
            currentBet = parseInt(document.getElementById('bet').value);
            if(currentBet > balance || currentBet <= 0) return alert("Мало денег!");
            balance -= currentBet; updateUI(); saveDB();
            isFlying = true; currentX = 1.00;
            crashAt = (Math.random() * 5 + 1.1).toFixed(2);
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'block';
            document.getElementById('hero').classList.remove('crashed');
            timer = setInterval(() => {
                currentX += 0.01;
                document.getElementById('mult').innerText = currentX.toFixed(2) + "x";
                document.getElementById('win-sum').innerText = Math.floor(currentBet * currentX);
                document.getElementById('hero').style.left = Math.min(30 + (currentX - 1) * 50, 310) + 'px';
                document.getElementById('hero').style.bottom = Math.min(30 + (currentX - 1) * 35, 170) + 'px';
                if(currentX >= crashAt) crash();
            }, 80);
        }

        function crash() {
            clearInterval(timer); isFlying = false;
            addHistory(currentX, 'lose-x');
            document.getElementById('mult').style.color = 'var(--lose)';
            document.getElementById('hero').classList.add('crashed');
            setTimeout(reset, 2000);
        }

        function collect() {
            if(!isFlying) return;
            clearInterval(timer);
            balance += Math.floor(currentBet * currentX); saveDB(); updateUI();
            addHistory(currentX, 'win-x');
            isFlying = false;
            setTimeout(reset, 1200);
        }

        function reset() {
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('mult').style.color = 'var(--win)';
            document.getElementById('hero').style.cssText = "left: 30px; bottom: 30px;";
        }

        function addHistory(x, cls) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.className = 'hist-item ' + cls;
            div.innerText = parseFloat(x).toFixed(2) + 'x';
            h.prepend(div);
            if(h.children.length > 4) h.lastChild.remove();
        }

        function updateUI() { document.getElementById('bal').innerText = Math.floor(balance) + "₽"; }
        function saveDB() { 
            const user = localStorage.getItem('current_user') || 'GUEST';
            let stored = JSON.parse(localStorage.getItem('users_jet')) || {};
            if(!stored[user]) stored[user] = {};
            stored[user].bal = balance;
            localStorage.setItem('users_jet', JSON.stringify(stored));
        }

        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            if(isFlying && stars.length < 50) stars.push({x: canvas.width+10, y: Math.random()*canvas.height, s: Math.random()*2, sp: Math.random()*15+5});
            stars.forEach((s, i) => {
                s.x -= isFlying ? s.sp : 0.5;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill();
                if(s.x < -10) stars.splice(i,1);
            });
            requestAnimationFrame(drawStars);
        }
    </script>
</body>
</html>
