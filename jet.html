<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET ELITE — ROCKET</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --win: #00ff88; --bg: #050505; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; font-family: 'Orbitron', sans-serif; color: #fff; overflow-x: hidden; }
        
        /* КОНТЕЙНЕР */
        .main-frame { width: 92%; max-width: 420px; background: #0a0a0a; border: 2px solid var(--primary); border-radius: 40px; padding: 20px; box-shadow: 0 0 40px rgba(188, 19, 254, 0.3); margin-top: 20px; }

        /* ИСТОРИЯ ИКСОВ */
        .history-bar { display: flex; gap: 8px; margin-bottom: 15px; height: 30px; justify-content: center; }
        .hist-item { background: rgba(255,255,255,0.05); border: 1px solid var(--primary); border-radius: 8px; padding: 4px 10px; font-size: 0.7rem; color: var(--win); font-weight: 900; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: scale(0); } to { transform: scale(1); } }

        /* ПЛЕЕР */
        .mini-player { width: 92%; max-width: 420px; background: rgba(188, 19, 254, 0.05); border: 1px solid var(--primary); border-radius: 100px; padding: 8px 20px; margin: 20px 0 10px; display: flex; align-items: center; gap: 10px; }
        .disk { width: 20px; height: 20px; border: 2px solid var(--primary); border-radius: 50%; animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* ИГРОВОЕ ПОЛЕ */
        #area { height: 250px; background: #000; border-radius: 25px; position: relative; overflow: hidden; border: 1px solid #222; margin-bottom: 15px; }
        #mult { font-size: 4.5rem; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--win); z-index: 10; text-shadow: 0 0 25px var(--win); }
        #hero { position: absolute; bottom: 20px; left: 20px; z-index: 5; font-size: 55px; filter: drop-shadow(0 0 15px var(--primary)); }

        /* КНОПКИ */
        .game-btn { width: 100%; height: 80px; border: none; border-radius: 20px; font-weight: 900; font-size: 1.6rem; cursor: pointer; text-transform: uppercase; }
        #btn-start { background: linear-gradient(180deg, var(--primary), #8a0db8); color: #fff; }
        #btn-cash { display: none; background: linear-gradient(180deg, var(--win), #00b35f); color: #000; }
        
        input { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; font-size: 1.4rem; font-weight: 900; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

    <audio id="track" loop><source src="6utra.mp3" type="audio/mpeg"></audio>

    <div class="mini-player">
        <div class="disk"></div>
        <marquee style="font-size: 10px; color: var(--primary); font-weight: 900;">ON AIR: 6 УТРА — В КАБИНЕ ФОТОГРАФИЯ ТВОЯ...</marquee>
    </div>

    <div class="main-frame">
        <div class="history-bar" id="history"></div>
        
        <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-weight: 900;">
            <span id="nick" style="color: var(--primary);">USER</span>
            <span id="bal" style="color: var(--win);">5 000₽</span>
        </div>

        <div id="area">
            <canvas id="star-canvas" style="position: absolute; width: 100%; height: 100%;"></canvas>
            <div id="mult">1.00x</div>
            <div id="hero" style="transition: 0.1s linear;">🚀</div>
        </div>

        <input type="number" id="bet" value="100">
        
        <button id="btn-start" class="game-btn" onclick="fly()">СТАВКА</button>
        <button id="btn-cash" class="game-btn" onclick="collect()">ЗАБРАТЬ<br><span id="win-sum" style="font-size: 1.2rem;">0₽</span></button>
        
        <center><a href="index.html" style="color:#444; font-size: 0.7rem; text-decoration:none; display:block; margin-top:15px;">ВЕРНУТЬСЯ В ЛОББИ</a></center>
    </div>

    <script>
        let balance, isFlying = false, currentX = 1.0, timer, crashAt, currentBet;
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let starPool = [];

        window.onload = () => {
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
            balance = parseInt(localStorage.getItem('bal')?.replace(/\s/g, '') || 5000);
            document.getElementById('nick').innerText = (localStorage.getItem('user') || 'GUEST').toUpperCase();
            updateUI();
            loadHistory();
            document.getElementById('track').play().catch(() => {});
        };

        function fly() {
            if (isFlying) return;
            currentBet = parseInt(document.getElementById('bet').value);
            if(currentBet > balance || currentBet <= 0) return alert("МАЛО СРЕДСТВ");
            
            balance -= currentBet; updateUI();
            isFlying = true; currentX = 1.0;
            crashAt = (Math.random() * 4 + 1.1).toFixed(2);

            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'block';
            document.getElementById('mult').style.color = 'var(--win)';

            timer = setInterval(() => {
                currentX += 0.01;
                document.getElementById('mult').innerText = currentX.toFixed(2) + "x";
                document.getElementById('win-sum').innerText = Math.floor(currentBet * currentX) + "₽";
                
                // ТРАЕКТОРИЯ ПОЛЕТА (Дуга)
                let progress = Math.min((currentX - 1) / 3, 1); 
                let posX = 20 + (progress * (canvas.width - 100));
                let posY = 20 + (Math.sin(progress * Math.PI / 2) * (canvas.height - 100));
                
                let hero = document.getElementById('hero');
                hero.style.left = posX + 'px';
                hero.style.bottom = posY + 'px';
                hero.style.transform = `rotate(${-progress * 25}deg)`;

                if(currentX >= crashAt) crash();
            }, 60);
        }

        function crash() {
            clearInterval(timer); isFlying = false;
            document.getElementById('mult').style.color = '#ff4d4d';
            addHistory(currentX.toFixed(2));
            setTimeout(() => reset(), 1500);
        }

        function collect() {
            if(!isFlying) return;
            balance += Math.floor(currentBet * currentX);
            addHistory(currentX.toFixed(2));
            reset();
        }

        function reset() {
            clearInterval(timer); isFlying = false;
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            updateUI();
        }

        function updateUI() {
            document.getElementById('bal').innerText = balance.toLocaleString() + "₽";
            localStorage.setItem('bal', balance.toLocaleString());
        }

        function addHistory(val) {
            let h = JSON.parse(localStorage.getItem('jet_h') || '[]');
            h.unshift(val); if(h.length > 4) h.pop();
            localStorage.setItem('jet_h', JSON.stringify(h));
            loadHistory();
        }

        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('jet_h') || '[]');
            document.getElementById('history').innerHTML = h.map(x => `<div class="hist-item">${x}x</div>`).join('');
        }

        // ЗВЕЗДНЫЙ ШЛЕЙФ
        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            if(starPool.length < 50) starPool.push({x: canvas.width, y: Math.random()*canvas.height, s: Math.random()*3});
            starPool.forEach((s, i) => {
                s.x -= isFlying ? currentX * 3 : 1;
                ctx.fillStyle = isFlying ? "var(--win)" : "#333";
                ctx.fillRect(s.x, s.y, s.s, s.s);
                if(s.x < 0) starPool[i] = {x: canvas.width, y: Math.random()*canvas.height, s: Math.random()*3};
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();
    </script>
</body>
</html>
