<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLEEPKIDD LUCKY ROCKET</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { background: #050505; margin: 0; display: flex; flex-direction: column; align-items: center; font-family: 'Orbitron', sans-serif; color: #fff; min-height: 100vh; overflow-x: hidden; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        /* ГЛОБАЛЬНЫЙ НЕОНОВЫЙ ФИЛЬТР */
        #game-container { transition: filter 0.3s; width: 100%; display: flex; flex-direction: column; align-items: center; }

        /* СТИЛЬ КНОПОК */
        .game-btn {
            width: 100% !important; height: 85px !important; border: none !important;
            border-radius: 25px !important; font-weight: 900 !important;
            font-size: 1.7rem !important; text-transform: uppercase !important;
            cursor: pointer !important; display: flex !important;
            flex-direction: column !important; align-items: center !important;
            justify-content: center !important; line-height: 1 !important;
        }

        #btn-cash { display: none !important; background: linear-gradient(180deg, #00ff88, #00b35f); color: #000; box-shadow: 0 0 30px rgba(0, 255, 136, 0.4); }
        #btn-start { display: flex !important; background: linear-gradient(180deg, #bc13fe, #8a0db8); color: #fff; box-shadow: 0 0 30px rgba(188, 19, 254, 0.4); }

        /* МИНИ ПЛЕЕР В ИГРЕ */
        .mini-player {
            width: 92%; max-width: 420px; background: rgba(188, 19, 254, 0.05);
            border: 1px solid rgba(188, 19, 254, 0.3); border-radius: 15px;
            padding: 8px 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 10px;
        }
        .disk-min { width: 18px; height: 18px; border: 2px solid #bc13fe; border-radius: 50%; animation: spin 3s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- АУДИО (Тот же файл что в лобби) -->
    <audio id="track" loop><source src="6utra.mp3" type="audio/mpeg"></audio>

    <div id="game-container">
        <!-- ЛОГОТИП -->
        <div style="margin: 25px 0 10px 0; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-15deg); text-align: center;">
            <span style="font-size: 20px; color: #bc13fe; display: block; text-shadow: 0 0 20px #bc13fe;">ROCKET</span>
            <span style="font-size: 36px; color: #fff; letter-spacing: -2px; display: block;">SLEEPKIDD</span>
        </div>

        <!-- МИНИ ПЛЕЕР -->
        <div class="mini-player">
            <div class="disk-min"></div>
            <marquee style="font-size: 9px; color: #bc13fe;">ON AIR: 6 УТРА — В КАБИНЕ ФОТОГРАФИЯ ТВОЯ...</marquee>
        </div>
        
        <div style="width: 92%; max-width: 420px; background: #0a0a0a; border: 2px solid #bc13fe; border-radius: 40px; padding: 20px; box-shadow: 0 0 40px rgba(188, 19, 254, 0.3); position: relative;">
            
            <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 15px;">
                <a href="index.html" style="text-decoration: none; color: #fff; font-size: 0.7rem; font-weight: 900; padding: 8px 15px; border-radius: 10px; background: #111; border: 1px solid #bc13fe;">ВЕРНУТЬСЯ В ЛОББИ</a>
            </div>

            <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:1rem; font-weight: 900;">
                <span id="nick" style="color: #bc13fe;">USER</span>
                <span id="bal" style="color: #00ff88;">5 000₽</span>
            </div>

            <!-- ИГРОВОЕ ПОЛЕ -->
            <div id="area" style="height: 200px; background: #000; border-radius: 25px; position: relative; overflow: hidden; border: 1px solid #222; margin-bottom: 15px;">
                <canvas id="star-canvas" style="position: absolute; width: 100%; height: 100%;"></canvas>
                <div id="mult" style="font-size: 4rem; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00ff88; z-index: 10; text-shadow: 0 0 20px rgba(0,255,136,0.5);">1.00x</div>
                <div id="hero" style="position: absolute; bottom: 20px; left: 20px; z-index: 5; transition: 0.1s linear;">
                    <div style="font-size: 50px; filter: drop-shadow(0 0 15px #bc13fe);">🚀</div>
                </div>
            </div>

            <input type="number" id="bet" value="100" style="width: 100%; background: #000; border: 2px solid #222; color: #fff; padding: 15px; border-radius: 18px; font-size: 1.5rem; font-weight: 900; text-align: center; margin-bottom: 15px;">

            <button id="btn-start" class="game-btn" onclick="fly()">СТАВКА</button>
            <button id="btn-cash" class="game-btn" onclick="collect()">
                ЗАБРАТЬ
                <span id="win-sum" style="font-size: 1.3rem; opacity: 0.8;">0₽</span>
            </button>
        </div>
    </div>

    <script>
        let balance = 5000, currentBet, isFlying = false, currentX = 1.00, timer, crashAt;
        const audio = document.getElementById('track');

        window.onload = () => {
            // Подгружаем данные из лобби
            const savedUser = localStorage.getItem('user') || 'GUEST';
            const savedBal = localStorage.getItem('bal') || '5 000';
            balance = parseInt(savedBal.replace(/\s/g, ''));
            
            document.getElementById('nick').innerText = savedUser.toUpperCase();
            document.getElementById('bal').innerText = balance.toLocaleString() + "₽";
            
            // Автостарт музыки (если разрешено)
            audio.play().catch(() => console.log("Ожидание клика"));
            audio.volume = 0.3;
        };

        function fly() {
            if (isFlying) return;
            currentBet = parseInt(document.getElementById('bet').value);
            if(currentBet > balance || currentBet <= 0) return alert("Недостаточно средств!");
            
            balance -= currentBet;
            saveData();
            
            isFlying = true; 
            currentX = 1.00;
            crashAt = (Math.random() * 5 + 1.1).toFixed(2); // Рандом для теста

            document.getElementById('btn-start').style.setProperty('display', 'none', 'important');
            document.getElementById('btn-cash').style.setProperty('display', 'flex', 'important');

            timer = setInterval(() => {
                currentX += 0.01;
                document.getElementById('mult').innerText = currentX.toFixed(2) + "x";
                document.getElementById('win-sum').innerText = Math.floor(currentBet * currentX) + "₽";
                
                // Визуальный эффект: меняем цвет контейнера при росте икса
                document.getElementById('game-container').style.filter = `hue-rotate(${currentX * 10}deg)`;

                if(currentX >= crashAt) crash();
            }, 80);
        }

        function collect() {
            if (!isFlying) return;
            let win = Math.floor(currentBet * currentX);
            balance += win;
            saveData();
            resetGame("WIN! +" + win + "₽");
        }

        function crash() {
            resetGame("CRASH!");
        }

        function resetGame(msg) {
            clearInterval(timer);
            isFlying = false;
            document.getElementById('btn-start').style.setProperty('display', 'flex', 'important');
            document.getElementById('btn-cash').style.setProperty('display', 'none', 'important');
            document.getElementById('game-container').style.filter = "none";
            if(msg.includes("CRASH")) document.getElementById('mult').style.color = "#ff4d4d";
        }

        function saveData() {
            document.getElementById('bal').innerText = balance.toLocaleString() + "₽";
            localStorage.setItem('bal', balance.toLocaleString());
        }
    </script>
</body>
</html>
