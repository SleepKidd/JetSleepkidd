<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — PREMIUM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --bg: #030303; --win: #00ff88; --lose: #ff4d4d; --fire: #ff6a00; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .logo-box { margin: 25px 0; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-12deg); text-align: center; }
        .logo-box .top { font-size: 22px; color: var(--primary); display: block; text-shadow: 0 0 15px var(--primary); }
        .logo-box .bot { font-size: 32px; color: #fff; }

        /* Контейнер с неоновой рамкой */
        .container { width: 95%; max-width: 440px; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(30px); border: 2px solid var(--primary); border-radius: 40px; padding: 25px; text-align: center; box-shadow: 0 0 40px rgba(188, 19, 254, 0.25), inset 0 0 20px rgba(188, 19, 254, 0.1); position: relative; }
        
        .nav-bar { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 15px; }
        .back-nav { text-decoration: none; color: #aaa; font-size: 0.8rem; font-weight: 900; transition: 0.3s; padding: 8px 16px; border-radius: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .back-nav:hover { color: #fff; background: var(--primary); border-color: var(--primary); }

        .history-line { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        .hist-item { background: #000; border: 1px solid var(--primary); padding: 4px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: 900; color: var(--win); box-shadow: 0 0 10px rgba(188, 19, 254, 0.2); }

        .game-area { height: 240px; background: #000; border-radius: 30px; position: relative; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(188, 19, 254, 0.3); }
        #star-canvas { position: absolute; top:0; left:0; width:100%; height:100%; }
        .multiplier { font-size: 4.5rem; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: var(--win); text-shadow: 0 0 40px rgba(0,255,136,0.6); }
        
        /* Ракета и Огонь — ИСПРАВЛЕНО */
        .hero-wrap { position: absolute; bottom: 20px; left: 20px; z-index: 5; display: flex; align-items: center; justify-content: center; width: 60px; height: 60px; transform: rotate(-10deg); }
        .character { font-size: 55px; filter: drop-shadow(0 0 15px var(--primary)); position: relative; z-index: 2; }
        
        .rocket-fire { 
            position: absolute; 
            right: 45px; /* Жёстко привязано к соплу */
            top: 50%;
            transform: translateY(-50%);
            width: 50px; height: 22px; 
            background: radial-gradient(ellipse at right, #fff, #ffcc00, var(--fire), transparent);
            filter: blur(4px); border-radius: 50% 20% 20% 50%; display: none;
            box-shadow: -10px 0 20px var(--fire);
        }
        .is-flying .rocket-fire { display: block; animation: flamePulse 0.1s infinite alternate; }
        @keyframes flamePulse { from { width: 45px; transform: translateY(-50%) scaleY(0.95); } to { width: 65px; transform: translateY(-50%) scaleY(1.05); } }

        .main-btn { width: 100%; padding: 20px; background: linear-gradient(135deg, var(--primary), #8a0db8); color: #fff; border: none; border-radius: 20px; font-weight: 900; font-size: 1.4rem; text-transform: uppercase; cursor: pointer; transition: 0.3s; box-shadow: 0 6px 20px rgba(188, 19, 254, 0.4); }
        .main-btn:active { transform: scale(0.97); box-shadow: 0 2px 10px rgba(188, 19, 254, 0.4); }
        .cashout-btn { background: linear-gradient(135deg, var(--win), #00b35f); color: #000; display: none; box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4); }
        
        input { background: rgba(0,0,0,0.5); border: 1px solid rgba(188, 19, 254, 0.4); color: #fff; padding: 15px; border-radius: 18px; width: 100%; text-align: center; font-family: 'Orbitron'; margin-bottom: 15px; font-size: 1.1rem; font-weight: 900; }
        
        .auto-box { display: flex; gap: 12px; margin-bottom: 15px; }
        .auto-item { flex: 1; background: var(--glass); padding: 10px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auto-item span { font-size: 0.7rem; font-weight: 900; color: #777; margin-bottom: 8px; }
        
        .crashed { filter: grayscale(1) brightness(0.5) blur(2px) !important; transition: 0.5s; }
    </style>
</head>
<body>
    <div class="logo-box"><span class="top">JET</span><span class="bot">SLEEPKIDD</span></div>
    
    <div class="container">
        <div class="nav-bar"><a href="index.html" class="back-nav">← МЕНЮ</a></div>
        <div class="history-line" id="history"></div>
        
        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:15px; padding: 0 10px;">
            <span id="ui-nick" style="color:#666">USER</span>
            <span id="ui-bal" style="color:var(--win); font-weight:900">0₽</span>
        </div>

        <div class="game-area" id="area">
            <canvas id="star-canvas"></canvas>
            <div class="multiplier" id="mult">1.00x</div>
            <div class="hero-wrap" id="hero">
                <div class="rocket-fire"></div>
                <div class="character">🚀</div>
            </div>
        </div>

        <input type="number" id="bet" value="50" inputmode="numeric">

        <div class="auto-box">
            <div class="auto-item">
                <span>АВТОСТАВКА</span>
                <input type="checkbox" id="auto-bet" style="width:24px; height:24px; cursor:pointer;">
            </div>
            <div class="auto-item">
                <span>АВТОВЫВОД</span>
                <div style="display:flex; align-items:center; gap:8px;">
                    <input type="number" id="auto-cash-val" value="2.0" style="width:55px; margin:0; padding:5px; font-size:0.9rem; border-radius:8px;">
                    <input type="checkbox" id="auto-cash-check" style="width:24px; height:24px; cursor:pointer;">
                </div>
            </div>
        </div>

        <button class="main-btn" id="btn-start" onclick="fly()">СТАВКА</button>
        <button class="main-btn cashout-btn" id="btn-cash" onclick="collect()">ЗАБРАТЬ <br> <span id="win-sum" style="font-size: 1.6rem;">0</span>₽</button>
    </div>

    <script>
        let balance, user, users, currentBet, isFlying = false, currentX = 1.00, timer, crashAt;
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        window.onload = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            user = localStorage.getItem('current_user') || 'GUEST';
            users = JSON.parse(localStorage.getItem('users_jet')) || {'GUEST': {bal: 1000}};
            balance = users[user].bal;
            document.getElementById('ui-nick').innerText = user.toUpperCase();
            updateUI();
            drawStars();
        };

        function fly() {
            if (isFlying) return;
            currentBet = parseInt(document.getElementById('bet').value);
            if(currentBet > balance || currentBet <= 0) return;
            
            balance -= currentBet; updateUI(); saveDB();
            isFlying = true; currentX = 1.00;
            
            let rand = Math.random() * 100;
            if (rand < 28) crashAt = (Math.random() * 0.1 + 1.01).toFixed(2);
            else if (rand < 88) crashAt = (Math.random() * 3 + 1.2).toFixed(2);
            else crashAt = (Math.random() * 15 + 4).toFixed(2);

            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'block';
            document.getElementById('mult').style.color = 'var(--win)';
            
            const h = document.getElementById('hero');
            h.classList.remove('crashed');
            document.getElementById('area').classList.add('is-flying');

            timer = setInterval(() => {
                currentX += 0.01;
                document.getElementById('mult').innerText = currentX.toFixed(2) + "x";
                document.getElementById('win-sum').innerText = Math.floor(currentBet * currentX);
                
                h.style.left = Math.min(20 + (currentX - 1) * 55, 300) + 'px';
                h.style.bottom = Math.min(20 + (currentX - 1) * 40, 160) + 'px';

                if(document.getElementById('auto-cash-check').checked) {
                    if(currentX >= parseFloat(document.getElementById('auto-cash-val').value)) collect();
                }
                
                if(currentX >= crashAt) crash();
            }, 80);
        }

        function crash() {
            clearInterval(timer); isFlying = false;
            addHistory(currentX, 'var(--lose)');
            document.getElementById('mult').style.color = 'var(--lose)';
            document.getElementById('hero').classList.add('crashed');
            document.getElementById('area').classList.remove('is-flying');
            setTimeout(reset, 2000);
        }

        function collect() {
            if(!isFlying) return;
            clearInterval(timer);
            balance += Math.floor(currentBet * currentX); saveDB(); updateUI();
            addHistory(currentX, 'var(--win)');
            isFlying = false;
            document.getElementById('area').classList.remove('is-flying');
            setTimeout(reset, 1200);
        }

        function reset() {
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('mult').style.color = 'var(--win)';
            document.getElementById('hero').style.cssText = "left: 20px; bottom: 20px; opacity: 1;";
            if(document.getElementById('auto-bet').checked) setTimeout(fly, 1500);
        }

        function addHistory(x, color) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.className = 'hist-item'; div.style.color = color;
            div.innerText = parseFloat(x).toFixed(2) + 'x';
            h.prepend(div);
            if(h.children.length > 6) h.lastChild.remove();
        }

        function updateUI() { document.getElementById('ui-bal').innerText = Math.floor(balance) + "₽"; }
        function saveDB() { if(users[user]) { users[user].bal = balance; localStorage.setItem('users_jet', JSON.stringify(users)); } }

        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            if(isFlying && stars.length < 50) stars.push({x: canvas.width+10, y: Math.random()*canvas.height, s: Math.random()*2.5, sp: Math.random()*15+5});
            stars.forEach((s, i) => {
                s.x -= isFlying ? s.sp : 0.5;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill();
                if(s.x < -10) stars.splice(i,1);
            });
            requestAnimationFrame(drawStars);
        }
    </script>
</body>
</html>
