<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — RELOADED</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { 
            --primary: #bc13fe; 
            --bg: #050505; 
            --win: #00ff88; 
            --lose: #ff4d4d; 
            --panel: rgba(20, 20, 20, 0.7);
            --neon-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            background: var(--bg); 
            background-image: radial-gradient(circle at 50% 50%, #1a0525 0%, #050505 100%);
            color: #fff; 
            font-family: 'Orbitron', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        /* Основной контейнер с неоновым свечением */
        .container { 
            width: 95%; 
            max-width: 440px; 
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(188, 19, 254, 0.3);
            border-radius: 40px; 
            padding: 25px; 
            text-align: center; 
            box-shadow: var(--neon-shadow), inset 0 0 15px rgba(188, 19, 254, 0.1);
            margin: 20px 0;
            position: relative;
        }

        .nav-bar { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 15px; }
        .back-nav { 
            text-decoration: none; 
            color: #fff; 
            font-size: 0.8rem; 
            font-weight: 900; 
            padding: 8px 20px; 
            border-radius: 12px; 
            background: linear-gradient(135deg, #333, #111);
            border: 1px solid var(--primary);
            box-shadow: 0 0 10px rgba(188, 19, 254, 0.3);
        }

        /* История коэффициентов */
        .history-line { 
            display: flex; 
            gap: 10px; 
            overflow-x: auto; 
            justify-content: center; 
            margin-bottom: 20px; 
            padding: 5px;
        }
        .hist-item { 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid var(--primary); 
            padding: 5px 12px; 
            border-radius: 12px; 
            font-size: 0.9rem; 
            font-weight: 900; 
            color: var(--win);
            text-shadow: 0 0 5px var(--win);
        }

        /* Игровое поле с анимацией */
        .game-area { 
            height: 250px; 
            background: #000; 
            border-radius: 30px; 
            position: relative; 
            overflow: hidden; 
            margin-bottom: 20px; 
            border: 2px solid var(--primary);
            box-shadow: inset 0 0 30px rgba(188, 19, 254, 0.2);
        }
        
        /* Сетка на фоне */
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(188, 19, 254, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(188, 19, 254, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            top: -50%;
            left: -50%;
            animation: gridMove 5s linear infinite;
        }
        @keyframes gridMove { from { transform: perspective(500px) rotateX(60deg) translateY(0); } to { transform: perspective(500px) rotateX(60deg) translateY(40px); } }

        #star-canvas { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 1; }
        
        .multiplier { 
            font-size: 4.5rem; 
            font-weight: 900; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 10; 
            color: var(--win); 
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.5);
        }
        
        .hero-wrap { position: absolute; bottom: 30px; left: 30px; z-index: 5; transition: 0.1s linear; }
        .character { 
            font-size: 55px; 
            filter: drop-shadow(0 0 15px var(--primary));
        }

        /* Стеклянные панели управления */
        .controls { display: flex; flex-direction: column; gap: 15px; }
        
        .input-wrapper {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input[type="number"] { 
            width: 100%; 
            background: transparent;
            border: none;
            color: #fff; 
            padding: 15px; 
            font-size: 1.5rem; 
            font-family: 'Orbitron'; 
            font-weight: 900; 
            text-align: center; 
        }

        .auto-panel { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 15px; 
        }
        
        .auto-card { 
            background: rgba(0, 0, 0, 0.4); 
            padding: 15px; 
            border-radius: 20px; 
            border: 1px solid rgba(188, 19, 254, 0.2);
            display: flex; 
            flex-direction: column; 
            align-items: center;
        }
        .auto-card span { font-size: 0.7rem; font-weight: 900; color: #888; margin-bottom: 10px; letter-spacing: 1px; }

        /* Объемные кнопки */
        .main-btn { 
            width: 100%; 
            padding: 22px; 
            background: linear-gradient(180deg, var(--primary) 0%, #8a0db8 100%); 
            color: #fff; 
            border: none; 
            border-radius: 22px; 
            font-weight: 900; 
            font-size: 1.5rem; 
            text-transform: uppercase; 
            cursor: pointer; 
            box-shadow: 0 6px 0 #5e087d, 0 10px 20px rgba(188, 19, 254, 0.4);
            transition: 0.1s;
        }
        .main-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #5e087d; }

        .cashout-btn { 
            background: linear-gradient(180deg, var(--win) 0%, #00b35f 100%); 
            color: #000; 
            display: none; 
            box-shadow: 0 6px 0 #008546, 0 10px 20px rgba(0, 255, 136, 0.3);
        }
        .cashout-btn:active { box-shadow: 0 2px 0 #008546; }

        .crashed { filter: grayscale(1) blur(2px) opacity(0.4); transition: 0.5s; }
    </style>
</head>
<body>

    <div class="logo-box">
        <span class="top">JET</span>
        <span class="bot">SLEEPKIDD</span>
    </div>
    
    <div class="container">
        <div class="nav-bar"><a href="index.html" class="back-nav">МЕНЮ</a></div>
        
        <div class="history-line" id="history"></div>
        
        <div style="display:flex; justify-content:space-between; font-size:1rem; margin-bottom:15px; padding: 0 10px; font-weight:900;">
            <span id="ui-nick" style="color:var(--primary); text-shadow: 0 0 10px var(--primary);">USER</span>
            <span id="ui-bal" style="color:var(--win); text-shadow: 0 0 10px var(--win);">0₽</span>
        </div>

        <div class="game-area" id="area">
            <div class="grid-bg"></div>
            <canvas id="star-canvas"></canvas>
            <div class="multiplier" id="mult">1.00x</div>
            <div class="hero-wrap" id="hero">
                <div class="character">🚀</div>
            </div>
        </div>

        <div class="controls">
            <div class="input-wrapper">
                <input type="number" id="bet" value="50" inputmode="numeric">
            </div>

            <div class="auto-panel">
                <div class="auto-card">
                    <span>АВТОСТАВКА</span>
                    <input type="checkbox" id="auto-bet" style="width:25px; height:25px; accent-color: var(--primary);">
                </div>
                <div class="auto-card">
                    <span>АВТОВЫВОД</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <input type="number" id="auto-cash-val" value="2.0" style="width:60px; padding:5px; font-size:1rem; margin:0; background: rgba(255,255,255,0.1); border-radius:10px;">
                        <input type="checkbox" id="auto-cash-check" style="width:25px; height:25px; accent-color: var(--win);">
                    </div>
                </div>
            </div>

            <button class="main-btn" id="btn-start" onclick="fly()">СТАВКА</button>
            <button class="main-btn cashout-btn" id="btn-cash" onclick="collect()">ЗАБРАТЬ <br> <span id="win-sum">0</span>₽</button>
        </div>
    </div>

    <script>
        let balance, user, users, currentBet, isFlying = false, currentX = 1.00, timer, crashAt;
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        window.onload = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            user = localStorage.getItem('current_user') || 'GUEST';
            users = JSON.parse(localStorage.getItem('users_jet')) || {'GUEST': {bal: 1000}};
            balance = users[user].bal;
            document.getElementById('ui-nick').innerText = user.toUpperCase();
            updateUI();
            drawStars();
        };

        function fly() {
            if (isFlying) return;
            currentBet = parseInt(document.getElementById('bet').value);
            if(currentBet > balance || currentBet <= 0) return alert("Баланс!");
            
            balance -= currentBet; updateUI(); saveDB();
            isFlying = true; currentX = 1.00;
            
            let rand = Math.random() * 100;
            if (rand < 25) crashAt = (Math.random() * 0.1 + 1.01).toFixed(2);
            else if (rand < 85) crashAt = (Math.random() * 2.5 + 1.2).toFixed(2);
            else crashAt = (Math.random() * 10 + 5).toFixed(2);

            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'block';
            document.getElementById('mult').style.color = 'var(--win)';
            document.getElementById('hero').classList.remove('crashed');

            timer = setInterval(() => {
                currentX += 0.01;
                document.getElementById('mult').innerText = currentX.toFixed(2) + "x";
                document.getElementById('win-sum').innerText = Math.floor(currentBet * currentX);
                
                document.getElementById('hero').style.left = Math.min(30 + (currentX - 1) * 50, 310) + 'px';
                document.getElementById('hero').style.bottom = Math.min(30 + (currentX - 1) * 35, 170) + 'px';

                if(document.getElementById('auto-cash-check').checked) {
                    if(currentX >= parseFloat(document.getElementById('auto-cash-val').value)) collect();
                }
                
                if(currentX >= crashAt) crash();
            }, 75);
        }

        function crash() {
            clearInterval(timer); isFlying = false;
            addHistory(currentX, 'var(--lose)');
            document.getElementById('mult').style.color = 'var(--lose)';
            document.getElementById('hero').classList.add('crashed');
            setTimeout(reset, 2000);
        }

        function collect() {
            if(!isFlying) return;
            clearInterval(timer);
            balance += Math.floor(currentBet * currentX); saveDB(); updateUI();
            addHistory(currentX, 'var(--win)');
            isFlying = false;
            setTimeout(reset, 1200);
        }

        function reset() {
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('mult').style.color = 'var(--win)';
            document.getElementById('hero').style.cssText = "left: 30px; bottom: 30px; opacity: 1;";
            if(document.getElementById('auto-bet').checked) setTimeout(fly, 1500);
        }

        function addHistory(x, color) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.className = 'hist-item'; div.style.color = color;
            div.innerText = parseFloat(x).toFixed(2) + 'x';
            h.prepend(div);
            if(h.children.length > 6) h.lastChild.remove();
        }

        function updateUI() { document.getElementById('ui-bal').innerText = Math.floor(balance) + "₽"; }
        function saveDB() { if(users[user]) { users[user].bal = balance; localStorage.setItem('users_jet', JSON.stringify(users)); } }

        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            if(isFlying && stars.length < 50) stars.push({x: canvas.width+10, y: Math.random()*canvas.height, s: Math.random()*3, sp: Math.random()*15+5});
            stars.forEach((s, i) => {
                s.x -= isFlying ? s.sp : 0.5;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill();
                if(s.x < -10) stars.splice(i,1);
            });
            requestAnimationFrame(drawStars);
        }
    </script>
</body>
</html>
