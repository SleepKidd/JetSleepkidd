<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — FINAL</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --bg: #030303; --win: #00ff88; --lose: #ff4d4d; --fire: #ff6a00; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .container { width: 95%; max-width: 420px; background: #0a0a0a; border: 2px solid var(--primary); border-radius: 35px; padding: 15px; text-align: center; margin-top: 10px; box-shadow: 0 0 30px rgba(188, 19, 254, 0.2); }
        
        /* Кнопка Назад */
        .nav-bar { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 10px; }
        .back-nav { text-decoration: none; color: #666; font-size: 0.7rem; font-weight: 900; padding: 8px 15px; border-radius: 12px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        .back-nav:hover { color: #fff; background: var(--primary); }

        /* История без вылетов за экран */
        .history-line { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; min-height: 30px; }
        .hist-item { background: rgba(255,255,255,0.05); border: 1px solid rgba(188, 19, 254, 0.5); padding: 3px 10px; border-radius: 10px; color: var(--win); font-weight: 900; font-size: 0.75rem; }

        .game-area { height: 220px; background: #000; border-radius: 20px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        #star-canvas { position: absolute; top:0; left:0; width:100%; height:100%; }
        .multiplier { font-size: 3.5rem; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: var(--win); text-shadow: 0 0 20px rgba(0,255,136,0.3); }

        /* Ракета и Оранжевое Пламя */
        .hero-wrap { position: absolute; bottom: 20px; left: 20px; z-index: 5; display: flex; align-items: center; }
        .character { font-size: 45px; position: relative; z-index: 2; transform: rotate(-10deg); }
        .rocket-fire { 
            position: absolute; 
            left: -35px; /* Смещено четко под сопло */
            top: 60%; 
            transform: translateY(-50%);
            width: 45px; height: 18px; 
            background: radial-gradient(ellipse at right, #fff, #ffcc00, var(--fire), transparent);
            filter: blur(4px); border-radius: 50% 20% 20% 50%;
            display: none;
            box-shadow: -5px 0 15px var(--fire);
        }
        .is-flying .rocket-fire { display: block; animation: flamePulse 0.1s infinite alternate; }
        @keyframes flamePulse { from { width: 40px; opacity: 0.8; transform: translateY(-50%) scaleY(0.9); } to { width: 55px; opacity: 1; transform: translateY(-50%) scaleY(1.1); } }

        /* Управление */
        .controls-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        input[type="number"] { width: 100%; background: #151515; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 15px; font-size: 1.1rem; font-family: 'Orbitron'; font-weight: 900; text-align: center; }
        
        .auto-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .auto-card { background: #111; padding: 10px; border-radius: 15px; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .auto-card span { font-size: 0.65rem; font-weight: 900; color: #666; margin-bottom: 5px; }
        
        .main-btn { width: 100%; padding: 20px; background: var(--primary); color: #fff; border: none; border-radius: 18px; font-weight: 900; font-size: 1.3rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 15px rgba(188, 19, 254, 0.3); }
        .cashout-btn { background: var(--win); color: #000; display: none; box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3); }
        .main-btn:active { transform: scale(0.98); }

        .crashed { filter: grayscale(1) opacity(0.4); transition: 0.5s; }
    </style>
</head>
<body>

    <div class="container">
        <!-- КНОПКА МЕНЮ ВЕРНУЛАСЬ -->
        <div class="nav-bar"><a href="index.html" class="back-nav">← МЕНЮ</a></div>
        
        <div class="history-line" id="history"></div>
        
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.8rem; font-weight:900;">
            <span id="nick" style="color:#555">USER</span>
            <span id="bal" style="color:var(--win)">0₽</span>
        </div>

        <div class="game-area" id="area">
            <canvas id="star-canvas"></canvas>
            <div class="multiplier" id="mult">1.00x</div>
            <div class="hero-wrap" id="hero">
                <div class="rocket-fire"></div>
                <div class="character">🚀</div>
            </div>
        </div>

        <div class="controls-grid">
            <input type="number" id="bet-amount" value="50">

            <div class="auto-panel">
                <div class="auto-card">
                    <span>АВТОСТАВКА</span>
                    <input type="checkbox" id="auto-bet" style="width:20px; height:20px;">
                </div>
                <div class="auto-card">
                    <span>АВТОВЫВОД</span>
                    <div style="display:flex; align-items:center; gap:5px;">
                        <input type="number" id="auto-cash-val" value="2.0" style="width:60px; padding:5px; font-size:0.8rem;">
                        <input type="checkbox" id="auto-cash-check" style="width:20px; height:20px;">
                    </div>
                </div>
            </div>

            <button class="main-btn" id="btn-start" onclick="startFly()">СТАВКА</button>
            <button class="main-btn cashout-btn" id="btn-cash" onclick="collectWin()">ЗАБРАТЬ <span id="win-preview">0</span></button>
        </div>
    </div>

    <script>
        let balance = 1000, currentBet = 0, isFlying = false, currentX = 1.0, timer, crashAt;
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        window.onload = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const user = localStorage.getItem('current_user') || 'GUEST';
            const stored = JSON.parse(localStorage.getItem('users_jet')) || {};
            balance = stored[user]?.bal || 1000;
            document.getElementById('nick').innerText = user.toUpperCase();
            updateUI();
            drawStars();
        };

        function startFly() {
            if(isFlying) return;
            currentBet = parseInt(document.getElementById('bet-amount').value);
            if(currentBet > balance || currentBet <= 0) return;

            balance -= currentBet;
            updateUI();
            isFlying = true; currentX = 1.0;
            
            let r = Math.random() * 100;
            if(r < 30) crashAt = (Math.random() * 0.1 + 1.01).toFixed(2);
            else if(r < 85) crashAt = (Math.random() * 2.5 + 1.1).toFixed(2);
            else crashAt = (Math.random() * 15 + 4).toFixed(2);

            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'block';
            document.getElementById('area').classList.add('is-flying');
            document.getElementById('hero').classList.remove('crashed');

            timer = setInterval(() => {
                currentX += 0.01;
                document.getElementById('mult').innerText = currentX.toFixed(2) + 'x';
                document.getElementById('win-preview').innerText = Math.floor(currentBet * currentX) + '₽';
                
                // Движение
                document.getElementById('hero').style.left = Math.min(20 + (currentX-1)*45, 290) + 'px';
                document.getElementById('hero').style.bottom = Math.min(20 + (currentX-1)*25, 140) + 'px';

                // Автовывод
                if(document.getElementById('auto-cash-check').checked) {
                    if(currentX >= parseFloat(document.getElementById('auto-cash-val').value)) collectWin();
                }

                if(currentX >= crashAt) explode();
            }, 75);
        }

        function explode() {
            clearInterval(timer);
            isFlying = false;
            document.getElementById('mult').style.color = 'var(--lose)';
            document.getElementById('area').classList.remove('is-flying');
            document.getElementById('hero').classList.add('crashed');
            addHistory(currentX, 'var(--lose)');
            saveToDB();
            setTimeout(resetGame, 2000);
        }

        function collectWin() {
            if(!isFlying) return;
            clearInterval(timer);
            isFlying = false;
            balance += Math.floor(currentBet * currentX);
            addHistory(currentX, 'var(--win)');
            updateUI();
            saveToDB();
            setTimeout(resetGame, 1000);
        }

        function resetGame() {
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('mult').innerText = '1.00x';
            document.getElementById('mult').style.color = 'var(--win)';
            document.getElementById('hero').style.cssText = "left:20px; bottom:20px;";
            document.getElementById('area').classList.remove('is-flying');
            if(document.getElementById('auto-bet').checked) setTimeout(startFly, 1200);
        }

        function addHistory(x, color) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.className = 'hist-item';
            div.style.color = color;
            div.innerText = parseFloat(x).toFixed(2) + 'x';
            h.prepend(div);
            if(h.children.length > 8) h.lastChild.remove();
        }

        function updateUI() { document.getElementById('bal').innerText = Math.floor(balance) + '₽'; }

        function saveToDB() {
            const user = localStorage.getItem('current_user') || 'GUEST';
            let stored = JSON.parse(localStorage.getItem('users_jet')) || {};
            if(!stored[user]) stored[user] = {};
            stored[user].bal = balance;
            localStorage.setItem('users_jet', JSON.stringify(stored));
        }

        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            if(isFlying && stars.length < 40) stars.push({x: canvas.width+10, y: Math.random()*canvas.height, s: Math.random()*2, sp: Math.random()*12+5});
            stars.forEach((s, i) => {
                s.x -= isFlying ? s.sp : 0.5;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill();
                if(s.x < -10) stars.splice(i,1);
            });
            requestAnimationFrame(drawStars);
        }
    </script>
</body>
</html>
