<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — LEGACY</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --bg: #050505; --win: #00ff88; --lose: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* ТА САМАЯ ЛЕГЕНДАРНАЯ НАДПИСЬ */
        .logo-box { margin: 25px 0; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-12deg); text-align: center; }
        .logo-box .top { font-size: 22px; color: var(--primary); display: block; text-shadow: 0 0 15px var(--primary); }
        .logo-box .bot { font-size: 34px; color: #fff; letter-spacing: -1px; }

        .container { 
            width: 95%; max-width: 440px; background: rgba(15, 15, 15, 0.9); border: 2px solid var(--primary); 
            border-radius: 40px; padding: 20px; text-align: center; box-shadow: 0 0 30px rgba(188, 19, 254, 0.2); position: relative; 
        }
        
        .nav-bar { width: 100%; display: flex; justify-content: flex-start; margin-bottom: 10px; }
        .back-nav { text-decoration: none; color: #555; font-size: 0.75rem; font-weight: 900; padding: 6px 12px; border-radius: 10px; background: rgba(255,255,255,0.03); }

        /* ИСТОРИЯ: 4 ИКСА БЕЗ ПОЛЗУНКА */
        .history-line { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; overflow: hidden; }
        .hist-item { background: #000; border: 1.5px solid var(--primary); padding: 6px 0; border-radius: 10px; font-size: 0.85rem; font-weight: 900; }
        .win-x { color: var(--win); border-color: var(--win); }
        .lose-x { color: var(--lose); border-color: var(--lose); }

        .game-area { height: 240px; background: #000; border-radius: 25px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; }
        #star-canvas { position: absolute; top:0; left:0; width:100%; height:100%; }
        
        .multiplier { font-size: 4.5rem; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: var(--win); }
        
        .hero-wrap { position: absolute; bottom: 25px; left: 25px; z-index: 5; transition: 0.1s linear; }
        .character { font-size: 55px; filter: drop-shadow(0 0 10px var(--primary)); }

        .input-box { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 18px; font-size: 1.4rem; font-family: 'Orbitron'; font-weight: 900; text-align: center; margin-bottom: 15px; }

        .auto-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .auto-card { background: #000; padding: 10px; border-radius: 15px; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; }
        .auto-card span { font-size: 0.6rem; font-weight: 900; color: #555; margin-bottom: 5px; }

        .main-btn { width: 100%; padding: 22px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-weight: 900; font-size: 1.5rem; text-transform: uppercase; cursor: pointer; box-shadow: 0 5px 0 #8a0db8; }
        .main-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #8a0db8; }
        .cashout-btn { background: var(--win); color: #000; display: none; box-shadow: 0 5px 0 #008546; }

        .crashed { filter: grayscale(1) opacity(0.3); transition: 0.5s; }
    </style>
</head>
<body>

    <div class="logo-box">
        <span class="top">JET</span>
        <span class="bot">SLEEPKIDD</span>
    </div>
    
    <div class="container">
        <div class="nav-bar"><a href="index.html" class="back-nav">← МЕНЮ</a></div>
        <div class="history-line" id="history"></div>
        
        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:12px; padding: 0 10px; font-weight:900;">
            <span id="nick" style="color:var(--primary)">PLAYER</span>
            <span id="bal" style="color:var(--win)">0₽</span>
        </div>

        <div class="game-area" id="area">
            <canvas id="star-canvas"></canvas>
            <div class="multiplier" id="mult">1.00x</div>
            <div class="hero-wrap" id="hero">
                <div class="character">🚀</div>
            </div>
        </div>

        <input type="number" id="bet" class="input-box" value="50">

        <div class="auto-panel">
            <div class="auto-card">
                <span>АВТОСТАВКА</span>
                <input type="checkbox" id="auto-bet" style="width:22px; height:22px;">
            </div>
            <div class="auto-card">
                <span>АВТОВЫВОД</span>
                <div style="display:flex; align-items:center; gap:5px;">
                    <input type="number" id="auto-cash-val" value="2.0" style="width:50px; background:#111; color:#fff; border:none; text-align:center; border-radius:5px;">
                    <input type="checkbox" id="auto-cash-check" style="width:22px; height:22px;">
                </div>
            </div>
        </div>

        <button class="main-btn" id="btn-start" onclick="fly()">СТАВКА</button>
        <button class="main-btn cashout-btn" id="btn-cash" onclick="collect()">ЗАБРАТЬ <br> <span id="win-sum">0</span>₽</button>
    </div>

    <script>
        let balance = 1000, currentBet, isFlying = false, currentX = 1.00, timer, crashAt;
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        window.onload = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const user = localStorage.getItem('current_user') || 'GUEST';
            const users = JSON.parse(localStorage.getItem('users_jet')) || {'GUEST': {bal: 1000}};
            balance = users[user].bal;
            document.getElementById('nick').innerText = user.toUpperCase();
            updateUI();
            drawStars();
        };

        function fly() {
            if (isFlying) return;
            currentBet = parseInt(document.getElementById('bet').value);
            if(currentBet > balance || currentBet <= 0) return alert("Баланс!");
            balance -= currentBet; updateUI(); saveDB();
            isFlying = true; currentX = 1.00;
            let r = Math.random() * 100;
            if (r < 25) crashAt = (Math.random() * 0.1 + 1.01).toFixed(2);
            else if (r < 85) crashAt = (Math.random() * 3 + 1.2).toFixed(2);
            else crashAt = (Math.random() * 10 + 5).toFixed(2);
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'block';
            document.getElementById('mult').style.color = 'var(--win)';
            document.getElementById('hero').classList.remove('crashed');
            timer = setInterval(() => {
                currentX += 0.01;
                document.getElementById('mult').innerText = currentX.toFixed(2) + "x";
                document.getElementById('win-sum').innerText = Math.floor(currentBet * currentX);
                document.getElementById('hero').style.left = Math.min(25 + (currentX - 1) * 55, 310) + 'px';
                document.getElementById('hero').style.bottom = Math.min(25 + (currentX - 1) * 40, 170) + 'px';
                if(document.getElementById('auto-cash-check').checked && currentX >= parseFloat(document.getElementById('auto-cash-val').value)) collect();
                if(currentX >= crashAt) crash();
            }, 80);
        }

        function crash() {
            clearInterval(timer); isFlying = false;
            addHistory(currentX, 'lose-x');
            document.getElementById('mult').style.color = 'var(--lose)';
            document.getElementById('hero').classList.add('crashed');
            setTimeout(reset, 2000);
        }

        function collect() {
            if(!isFlying) return;
            clearInterval(timer);
            balance += Math.floor(currentBet * currentX); saveDB(); updateUI();
            addHistory(currentX, 'win-x');
            isFlying = false;
            setTimeout(reset, 1200);
        }

        function reset() {
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('mult').style.color = 'var(--win)';
            document.getElementById('hero').style.cssText = "left: 25px; bottom: 25px;";
            if(document.getElementById('auto-bet').checked) setTimeout(fly, 1500);
        }

        function addHistory(x, cls) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.className = 'hist-item ' + cls;
            div.innerText = parseFloat(x).toFixed(2) + 'x';
            h.prepend(div);
            if(h.children.length > 4) h.lastChild.remove();
        }

        function updateUI() { document.getElementById('bal').innerText = Math.floor(balance) + "₽"; }
        function saveDB() { 
            const user = localStorage.getItem('current_user') || 'GUEST';
            let stored = JSON.parse(localStorage.getItem('users_jet')) || {};
            if(!stored[user]) stored[user] = {};
            stored[user].bal = balance;
            localStorage.setItem('users_jet', JSON.stringify(stored));
        }

        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            if(isFlying && stars.length < 40) stars.push({x: canvas.width+10, y: Math.random()*canvas.height, s: Math.random()*2, sp: Math.random()*15+5});
            stars.forEach((s, i) => {
                s.x -= isFlying ? s.sp : 0.5;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill();
                if(s.x < -10) stars.splice(i,1);
            });
            requestAnimationFrame(drawStars);
        }
    </script>
</body>
</html>
