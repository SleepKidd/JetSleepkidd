<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — FIXED</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --bg: #030303; --win: #00ff88; --lose: #ff4d4d; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .container { width: 95%; max-width: 420px; background: #0a0a0a; border: 2px solid var(--primary); border-radius: 40px; padding: 20px; text-align: center; margin-top: 10px; box-shadow: 0 0 30px rgba(188, 19, 254, 0.3); }
        
        /* История */
        .history-line { display: flex; gap: 8px; overflow-x: hidden; height: 40px; justify-content: center; margin-bottom: 10px; }
        .hist-item { background: rgba(188, 19, 254, 0.1); border: 1px solid var(--primary); padding: 5px 12px; border-radius: 15px; color: var(--win); font-weight: 900; font-size: 0.9rem; height: fit-content; }

        /* Игровое поле */
        .game-area { height: 230px; background: #000; border-radius: 25px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1px solid #222; }
        #star-canvas { position: absolute; top:0; left:0; width:100%; height:100%; }
        .multiplier { font-size: 4rem; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: var(--win); }

        /* Ракета и Пламя */
        .hero-wrap { position: absolute; bottom: 20px; left: 20px; z-index: 5; }
        .character { font-size: 50px; position: relative; z-index: 2; }
        .rocket-fire { 
            position: absolute; left: -40px; top: 50%; transform: translateY(-50%);
            width: 50px; height: 20px; 
            background: linear-gradient(to left, #bc13fe, #ff00ff, transparent);
            filter: blur(8px); border-radius: 50%; display: none;
        }
        .is-flying .rocket-fire { display: block; animation: flameMove 0.1s infinite alternate; }
        @keyframes flameMove { from { width: 45px; opacity: 0.7; } to { width: 65px; opacity: 1; } }

        /* Управление */
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.7rem; color: #666; margin-bottom: 5px; margin-left: 10px; }
        
        input[type="number"] { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 15px; font-size: 1.2rem; font-family: 'Orbitron'; font-weight: 900; text-align: center; }
        
        .auto-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .auto-btn { background: #111; padding: 10px; border-radius: 15px; border: 1px solid #222; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .auto-btn span { font-size: 0.6rem; font-weight: 900; }
        .auto-btn input { transform: scale(1.5); }

        .main-btn { width: 100%; padding: 22px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-weight: 900; font-size: 1.4rem; cursor: pointer; }
        .cashout-btn { background: var(--win); color: #000; display: none; }
        
        .crashed { filter: grayscale(1) blur(2px); opacity: 0.5; }
    </style>
</head>
<body>

    <div class="container">
        <div class="history-line" id="history"></div>
        
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:0.8rem; font-weight:900;">
            <span id="nick" style="color:var(--primary)">PLAYER</span>
            <span id="bal" style="color:var(--win)">0₽</span>
        </div>

        <div class="game-area" id="area">
            <canvas id="star-canvas"></canvas>
            <div class="multiplier" id="mult">1.00x</div>
            <div class="hero-wrap" id="hero">
                <div class="rocket-fire"></div>
                <div class="character">🚀</div>
            </div>
        </div>

        <div class="input-group">
            <label>СУММА СТАВКИ</label>
            <input type="number" id="bet-amount" value="50">
        </div>

        <div class="auto-controls">
            <div class="auto-btn">
                <span>АВТОСТАВКА</span>
                <input type="checkbox" id="auto-bet">
            </div>
            <div class="auto-btn">
                <span>АВТОВЫВОД (X)</span>
                <input type="number" id="auto-cash-val" value="2.00" style="padding: 2px; font-size: 0.9rem; width: 60px;">
                <input type="checkbox" id="auto-cash-check">
            </div>
        </div>

        <button class="main-btn" id="btn-start" onclick="startFly()">СТАВКА</button>
        <button class="main-btn cashout-btn" id="btn-cash" onclick="collectWin()">ЗАБРАТЬ <span id="win-preview">0</span></button>
    </div>

    <script>
        let balance = 1000, currentBet = 0, isFlying = false, currentX = 1.0, timer, crashAt;
        const canvas = document.getElementById('star-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        // Загрузка данных
        window.onload = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const stored = JSON.parse(localStorage.getItem('users_jet'));
            const user = localStorage.getItem('current_user') || 'GUEST';
            if(stored && stored[user]) {
                balance = stored[user].bal;
                document.getElementById('nick').innerText = user.toUpperCase();
            }
            updateUI();
            drawStars();
        };

        function startFly() {
            if(isFlying) return;
            currentBet = parseInt(document.getElementById('bet-amount').value);
            if(currentBet > balance || currentBet <= 0) return alert("Баланс!");

            balance -= currentBet;
            updateUI();
            
            isFlying = true;
            currentX = 1.0;
            
            // Логика икса
            let r = Math.random() * 100;
            if(r < 20) crashAt = (Math.random() * 0.1 + 1.01).toFixed(2);
            else if(r < 80) crashAt = (Math.random() * 2 + 1.2).toFixed(2);
            else crashAt = (Math.random() * 10 + 5).toFixed(2);

            // Визуал
            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'block';
            document.getElementById('area').classList.add('is-flying');
            document.getElementById('hero').classList.remove('crashed');
            document.getElementById('mult').style.color = 'var(--win)';

            timer = setInterval(() => {
                currentX += 0.01;
                document.getElementById('mult').innerText = currentX.toFixed(2) + 'x';
                document.getElementById('win-preview').innerText = Math.floor(currentBet * currentX) + '₽';
                
                // Движение ракеты
                document.getElementById('hero').style.left = Math.min(20 + (currentX-1)*50, 280) + 'px';
                document.getElementById('hero').style.bottom = Math.min(20 + (currentX-1)*30, 150) + 'px';

                // АВТОВЫВОД
                if(document.getElementById('auto-cash-check').checked) {
                    let target = parseFloat(document.getElementById('auto-cash-val').value);
                    if(currentX >= target) collectWin();
                }

                if(currentX >= crashAt) explode();
            }, 80);
        }

        function explode() {
            clearInterval(timer);
            isFlying = false;
            document.getElementById('mult').style.color = 'var(--lose)';
            document.getElementById('area').classList.remove('is-flying');
            document.getElementById('hero').classList.add('crashed');
            addHistory(currentX, 'var(--lose)');
            saveToDB();
            setTimeout(resetGame, 2000);
        }

        function collectWin() {
            if(!isFlying) return;
            clearInterval(timer);
            isFlying = false;
            let win = Math.floor(currentBet * currentX);
            balance += win;
            addHistory(currentX, 'var(--win)');
            updateUI();
            saveToDB();
            setTimeout(resetGame, 1500);
        }

        function resetGame() {
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('mult').innerText = '1.00x';
            document.getElementById('hero').style.cssText = "left:20px; bottom:20px;";
            document.getElementById('area').classList.remove('is-flying');
            
            // АВТОСТАВКА
            if(document.getElementById('auto-bet').checked) {
                setTimeout(startFly, 1000);
            }
        }

        function addHistory(x, color) {
            const h = document.getElementById('history');
            const div = document.createElement('div');
            div.className = 'hist-item';
            div.style.color = color;
            div.innerText = parseFloat(x).toFixed(2) + 'x';
            h.prepend(div);
            if(h.children.length > 5) h.lastChild.remove();
        }

        function updateUI() {
            document.getElementById('bal').innerText = Math.floor(balance) + '₽';
        }

        function saveToDB() {
            const user = localStorage.getItem('current_user') || 'GUEST';
            let stored = JSON.parse(localStorage.getItem('users_jet')) || {};
            if(!stored[user]) stored[user] = {};
            stored[user].bal = balance;
            localStorage.setItem('users_jet', JSON.stringify(stored));
        }

        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            if(isFlying && stars.length < 50) {
                stars.push({x: canvas.width+10, y: Math.random()*canvas.height, s: Math.random()*2+1, sp: Math.random()*10+5});
            }
            stars.forEach((s, i) => {
                s.x -= isFlying ? s.sp : 0.5;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill();
                if(s.x < -10) stars.splice(i,1);
            });
            requestAnimationFrame(drawStars);
        }
    </script>
</body>
</html>
