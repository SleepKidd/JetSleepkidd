<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JET SLEEPKIDD — ПОЛЕТ</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --primary: #bc13fe; --bg: #030303; --win: #00ff88; --lose: #ff4d4d; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .logo-box { margin: 20px 0; font-family: 'Rubik Mono One', sans-serif; transform: skewX(-12deg); text-align: center; }
        .logo-box .top { font-size: 20px; color: var(--primary); display: block; }
        .logo-box .bot { font-size: 30px; color: #fff; }

        .container { width: 95%; max-width: 420px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(25px); border: 2px solid var(--primary); border-radius: 40px; padding: 20px; text-align: center; box-shadow: 0 0 60px rgba(188, 19, 254, 0.2); position: relative; }
        
        /* История иксов - Крупная лента */
        .history-line { display: flex; gap: 10px; overflow-x: hidden; margin-bottom: 15px; padding: 5px; justify-content: center; height: 40px; }
        .hist-item { background: var(--glass); border: 1px solid var(--primary); padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: 900; color: var(--win); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .game-area { height: 230px; background: #000; border-radius: 25px; position: relative; overflow: hidden; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        #star-field { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .multiplier { font-size: 4rem; font-weight: 900; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; color: var(--win); text-shadow: 0 0 30px rgba(0,255,136,0.5); }
        
        /* Ракета и Огонь */
        .hero-wrap { position: absolute; bottom: 20px; left: 20px; z-index: 5; transition: 0.1s linear; }
        .character { font-size: 50px; filter: drop-shadow(0 0 10px var(--primary)); position: relative; z-index: 2; }
        .fire { 
            position: absolute; left: -30px; top: 50%; transform: translateY(-50%);
            width: 45px; height: 20px; background: linear-gradient(to left, var(--primary), #ff00ff, transparent);
            border-radius: 50%; filter: blur(6px); opacity: 0; 
        }
        .is-flying .fire { opacity: 1; animation: flamePulse 0.1s infinite alternate; }
        @keyframes flamePulse { from { width: 40px; } to { width: 60px; } }
        .shake { animation: shake 0.2s infinite ease-in-out; }
        @keyframes shake { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

        /* Крупные поля ввода и кнопки */
        input { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 15px; border-radius: 18px; width: 100%; text-align: center; font-family: 'Orbitron'; margin-bottom: 10px; font-size: 1.2rem; font-weight: 900; }
        
        .main-btn { width: 100%; padding: 20px; background: var(--primary); color: #fff; border: none; border-radius: 20px; font-weight: 900; font-size: 1.3rem; text-transform: uppercase; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(188, 19, 254, 0.4); }
        .cashout-btn { background: var(--win); color: #000; display: none; box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4); }
        .main-btn:active { transform: scale(0.95); }

        /* Блок настроек АВТО - Снова крупный */
        .auto-settings { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .auto-row { display: flex; align-items: center; justify-content: space-between; background: var(--glass); padding: 10px 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .auto-row label { font-size: 0.8rem; font-weight: 900; color: #aaa; }
        .auto-row input[type="number"] { width: 100px; margin-bottom: 0; padding: 5px; font-size: 1rem; border-radius: 10px; }
        .switch-input { width: 25px !important; height: 25px; cursor: pointer; margin: 0 !important; }

        .crashed { filter: grayscale(1) blur(1px) !important; opacity: 0.5; transition: 0.5s; }
    </style>
</head>
<body>
    <div class="logo-box"><span class="top">JET</span><span class="bot">SLEEPKIDD</span></div>
    
    <div class="container">
        <div class="history-line" id="history"></div>
        
        <div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-bottom:10px; padding: 0 5px;">
            <span id="ui-nick" style="color:#666">---</span>
            <span id="ui-bal" style="color:var(--win); font-weight:900">0₽</span>
        </div>

        <div class="game-area">
            <canvas id="star-field"></canvas>
            <div class="multiplier" id="mult">1.00x</div>
            <div class="hero-wrap" id="hero-wrap">
                <div class="fire"></div>
                <div class="character">🚀</div>
            </div>
        </div>

        <input type="number" id="bet" value="50" inputmode="numeric">

        <div class="auto-settings">
            <div class="auto-row">
                <label>АВТОСТАВКА</label>
                <input type="checkbox" id="auto-bet-toggle" class="switch-input">
            </div>
            <div class="auto-row">
                <label>АВТОВЫВОД X</label>
                <div style="display:flex; align-items:center; gap:10px;">
                    <input type="number" id="auto-cash-val" value="2.0" step="0.1">
                    <input type="checkbox" id="auto-cash-toggle" class="switch-input">
                </div>
            </div>
        </div>

        <button class="main-btn" id="btn-start" onclick="fly()">СТАВКА</button>
        <button class="main-btn cashout-btn" id="btn-cash" onclick="collect()">ЗАБРАТЬ <br> <span id="win-sum" style="font-size:1.5rem">0</span>₽</button>
    </div>

    <script>
        let balance, user, users, currentBet, isFlying = false, currentX = 1.00, timer, crashAt;
        const canvas = document.getElementById('star-field');
        const ctx = canvas.getContext('2d');
        let stars = [];

        window.onload = () => {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            user = localStorage.getItem('current_user') || 'GUEST';
            users = JSON.parse(localStorage.getItem('users_jet')) || { 'GUEST': { bal: 1000 } };
            balance = users[user]?.bal || 0;
            document.getElementById('ui-nick').innerText = user.toUpperCase();
            updateUI();
            animateStars();
        };

        function fly() {
            if (isFlying) return;
            currentBet = parseInt(document.getElementById('bet').value);
            if(currentBet > balance || currentBet <= 0) return alert("Баланс!");
            
            document.getElementById('bet').disabled = true;
            balance -= currentBet; updateUI(); saveDB();
            
            isFlying = true; currentX = 1.00;
            let rand = Math.random() * 100;
            if (rand < 25) crashAt = (Math.random() * 0.2 + 1.01).toFixed(2);
            else if (rand < 85) crashAt = (Math.random() * 3 + 1.2).toFixed(2);
            else crashAt = (Math.random() * 50 + 5).toFixed(2);

            document.getElementById('btn-start').style.display = 'none';
            document.getElementById('btn-cash').style.display = 'block';
            document.getElementById('mult').style.color = 'var(--win)';
            
            const h = document.getElementById('hero-wrap');
            h.classList.add('is-flying', 'shake');
            h.classList.remove('crashed');

            timer = setInterval(() => {
                currentX += 0.01;
                document.getElementById('mult').innerText = currentX.toFixed(2) + "x";
                document.getElementById('win-sum').innerText = Math.floor(currentBet * currentX);
                
                // Автовывод
                if(document.getElementById('auto-cash-toggle').checked) {
                    let target = parseFloat(document.getElementById('auto-cash-val').value);
                    if(currentX >= target) collect();
                }

                h.style.left = Math.min(20 + (currentX - 1) * 50, 300) + 'px';
                h.style.bottom = Math.min(20 + (currentX - 1) * 35, 160) + 'px';
                
                if(currentX >= crashAt) crash();
            }, 70);
        }

        function crash() {
            clearInterval(timer);
            isFlying = false;
            addHistory(currentX, 'var(--lose)');
            document.getElementById('mult').style.color = 'var(--lose)';
            const h = document.getElementById('hero-wrap');
            h.classList.remove('is-flying', 'shake');
            h.classList.add('crashed');
            setTimeout(reset, 2000);
        }

        function collect() {
            if(!isFlying) return;
            clearInterval(timer);
            balance += Math.floor(currentBet * currentX); 
            saveDB(); updateUI();
            addHistory(currentX, 'var(--win)');
            isFlying = false;
            document.getElementById('mult').style.color = 'var(--win)';
            document.getElementById('hero-wrap').classList.remove('is-flying', 'shake');
            setTimeout(reset, 1500);
        }

        function reset() {
            document.getElementById('btn-start').style.display = 'block';
            document.getElementById('btn-cash').style.display = 'none';
            document.getElementById('mult').innerText = "1.00x";
            document.getElementById('bet').disabled = false;
            const h = document.getElementById('hero-wrap');
            h.style.cssText = "left: 20px; bottom: 20px; opacity: 1;";
            h.classList.remove('crashed', 'shake', 'is-flying');
            
            if(document.getElementById('auto-bet-toggle').checked) {
                setTimeout(fly, 1000);
            }
        }

        function addHistory(val, color) {
            const hist = document.getElementById('history');
            const item = document.createElement('div');
            item.className = 'hist-item';
            item.style.color = color;
            item.innerText = val.toFixed(2) + 'x';
            hist.prepend(item);
            if(hist.children.length > 5) hist.lastChild.remove();
        }

        function updateUI() { 
            document.getElementById('ui-bal').innerText = Math.floor(balance) + "₽"; 
        }

        function saveDB() { 
            if(users[user]) { users[user].bal = balance; localStorage.setItem('users_jet', JSON.stringify(users)); }
        }

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#fff";
            if(isFlying && stars.length < 50) stars.push({x: canvas.width+10, y: Math.random()*canvas.height, s: Math.random()*2+1, sp: Math.random()*10+5});
            stars.forEach((s, i) => {
                s.x -= isFlying ? s.sp : 0.5;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 7); ctx.fill();
                if(s.x < -10) stars.splice(i, 1);
            });
            requestAnimationFrame(animateStars);
        }
    </script>
</body>
</html>
